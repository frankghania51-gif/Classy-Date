<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Buy Coins | ClassyDate</title>
    <meta name="description" content="Buy coins to unlock your connection.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #ACC8E5;
            color: #112A46;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .pricing-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(172, 200, 229, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(17, 42, 70, 0.08);
            padding: 0 20px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .pricing-header .brand {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 24px;
            font-weight: 700;
            color: #112A46;
        }

        .pricing-header .brand span {
            font-family: "Inter", sans-serif;
            font-weight: 300;
            color: #2E5A88;
        }

        .pricing-header .back {
            padding: 8px 20px;
            border-radius: 50px;
            background: rgba(17, 42, 70, 0.08);
            color: #112A46;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            font-family: "Inter", sans-serif;
            transition: all 0.3s ease;
        }

        .pricing-header .back:hover {
            background: rgba(17, 42, 70, 0.15);
        }

        /* Main */
        .pricing-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            min-height: 100vh;
            background: radial-gradient(ellipse at center top, rgba(17, 42, 70, 0.04), transparent 70%);
        }

        .pricing-card {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 40px 40px;
            border: 1px solid rgba(255, 255, 255, 0.30);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .pricing-card__header {
            text-align: center;
            margin-bottom: 32px;
        }

        .pricing-card__header .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }

        .pricing-card__header h1 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 28px;
            color: #112A46;
            font-weight: 700;
        }

        .pricing-card__header .subtitle {
            color: rgba(17, 42, 70, 0.5);
            font-size: 15px;
            margin-top: 4px;
            font-family: "Inter", sans-serif;
        }

        /* Country Display */
        .country-display {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .country-display .flag {
            font-size: 32px;
        }

        .country-display .info {
            flex: 1;
        }

        .country-display .info .name {
            font-weight: 700;
            font-size: 16px;
            color: #112A46;
            font-family: "Inter", sans-serif;
        }

        .country-display .info .currency {
            font-size: 13px;
            color: rgba(17, 42, 70, 0.4);
            font-family: "Inter", sans-serif;
        }

        .country-display .edit {
            padding: 6px 14px;
            border-radius: 50px;
            background: rgba(17, 42, 70, 0.08);
            color: #112A46;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: "Inter", sans-serif;
        }

        .country-display .edit:hover {
            background: rgba(17, 42, 70, 0.15);
        }

        /* Single Plan - 150 Coins for $13.00 */
        .single-plan {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 32px 24px;
            border: 2px solid rgba(17, 42, 70, 0.15);
            text-align: center;
            margin-bottom: 24px;
        }

        .single-plan .coins-icon {
            font-size: 56px;
            display: block;
            margin-bottom: 8px;
        }

        .single-plan .coins-amount {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 42px;
            font-weight: 700;
            color: #112A46;
        }

        .single-plan .coins-label {
            font-size: 16px;
            color: rgba(17, 42, 70, 0.4);
            font-family: "Inter", sans-serif;
        }

        .single-plan .price {
            font-size: 28px;
            font-weight: 700;
            color: #112A46;
            margin-top: 12px;
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
        }

        .single-plan .price span {
            font-size: 16px;
            font-weight: 400;
            color: rgba(17, 42, 70, 0.4);
            font-family: "Inter", sans-serif;
        }

        .single-plan .features {
            list-style: none;
            margin-top: 16px;
            display: grid;
            gap: 8px;
            text-align: left;
        }

        .single-plan .features li {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: rgba(17, 42, 70, 0.6);
            font-family: "Inter", sans-serif;
        }

        .single-plan .features li .check {
            color: #28a745;
            font-weight: 700;
        }

        .single-plan .popular-badge {
            display: inline-block;
            margin-top: 12px;
            padding: 4px 16px;
            background: #28a745;
            color: #fff;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            font-family: "Inter", sans-serif;
        }

        /* Button */
        .btn-subscribe {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #112A46, #2E5A88);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
        }

        .btn-subscribe:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(17, 42, 70, 0.35);
            background: linear-gradient(135deg, #2E5A88, #112A46);
        }

        .btn-subscribe:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .pricing-card {
                padding: 32px 24px 28px;
            }

            .pricing-card__header h1 {
                font-size: 24px;
            }

            .pricing-header .brand {
                font-size: 20px;
            }

            .single-plan .coins-amount {
                font-size: 32px;
            }

            .single-plan .price {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="pricing-header">
        <a class="brand" href="/">Classy<span>Date</span></a>
        <button class="back" onclick="history.back()">← Back</button>
    </header>

    <!-- Main -->
    <main class="pricing-wrapper">
        <div class="pricing-card">
            <div class="pricing-card__header">
                <span class="icon">🪙</span>
                <h1>Buy Coins</h1>
                <p class="subtitle" id="country-subtitle">Unlock your connection</p>
            </div>

            <!-- Country Display -->
            <div class="country-display">
                <span class="flag" id="display-flag">🌍</span>
                <div class="info">
                    <div class="name" id="display-country">Select your country</div>
                    <div class="currency" id="display-currency">Currency: USD</div>
                </div>
                <button class="edit" onclick="history.back()">✏️ Edit</button>
            </div>

            <!-- Single Plan - 150 Coins for $13.00 -->
            <div class="single-plan">
                <span class="coins-icon">🪙</span>
                <div class="coins-amount">150</div>
                <div class="coins-label">Coins</div>
                <div class="price">$13.00 <span>USD</span></div>
                <span class="popular-badge">🔥 Best Deal</span>
                <ul class="features">
                    <li><span class="check">✓</span> Unlock 1 connection</li>
                    <li><span class="check">✓</span> Start chatting instantly</li>
                    <li><span class="check">✓</span> One-time payment</li>
                    <li><span class="check">✓</span> No subscription needed</li>
                </ul>
            </div>

            <button class="btn-subscribe" id="subscribe-btn" onclick="completeSubscription()">
                💳 Buy Now - $13.00
            </button>
        </div>
    </main>

    <!-- ============================================================ -->
    <!-- SCRIPTS                                                      -->
    <!-- ============================================================ -->
    <script>
        // ============================================================
        // COUNTRY DATA
        // ============================================================
        const countryData = {
            'zimbabwe': { name: 'Zimbabwe', flag: '🇿🇼', currency: 'USD' },
            'south-africa': { name: 'South Africa', flag: '🇿🇦', currency: 'USD' },
            'zambia': { name: 'Zambia', flag: '🇿🇲', currency: 'USD' },
            'usa': { name: 'USA', flag: '🇺🇸', currency: 'USD' },
            'uk': { name: 'United Kingdom', flag: '🇬🇧', currency: 'GBP' },
            'canada': { name: 'Canada', flag: '🇨🇦', currency: 'CAD' },
            'australia': { name: 'Australia', flag: '🇦🇺', currency: 'AUD' },
            'nigeria': { name: 'Nigeria', flag: '🇳🇬', currency: 'USD' },
            'kenya': { name: 'Kenya', flag: '🇰🇪', currency: 'USD' },
            'uganda': { name: 'Uganda', flag: '🇺🇬', currency: 'USD' },
            'tanzania': { name: 'Tanzania', flag: '🇹🇿', currency: 'USD' },
            'botswana': { name: 'Botswana', flag: '🇧🇼', currency: 'USD' },
            'other': { name: 'Other Countries', flag: '🌍', currency: 'USD' }
        };

        // ============================================================
        // GET COUNTRY FROM URL
        // ============================================================
        function getCountryFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('country') || 'other';
        }

        // ============================================================
        // LOAD COUNTRY
        // ============================================================
        function loadCountry() {
            const countryCode = getCountryFromURL();
            const data = countryData[countryCode] || countryData['other'];

            document.getElementById('display-flag').textContent = data.flag;
            document.getElementById('display-country').textContent = data.name;
            document.getElementById('display-currency').textContent = `Currency: ${data.currency}`;
            document.getElementById('country-subtitle').textContent = `Selected: ${data.name}`;

            // Save for redirect
            localStorage.setItem('classydate_country', countryCode);
            localStorage.setItem('classydate_country_name', data.name);
        }

        // ============================================================
        // COMPLETE SUBSCRIPTION
        // ============================================================
        function completeSubscription() {
            const btn = document.getElementById('subscribe-btn');
            btn.textContent = '⏳ Processing...';
            btn.disabled = true;

            // Mark user as subscribed
            localStorage.setItem('classydate_subscribed', 'true');
            localStorage.setItem('classydate_coins', '150');

            // Get redirect URL
            const redirect = localStorage.getItem('redirect_after_subscribe') || 'members.html';

            setTimeout(() => {
                window.location.href = redirect;
            }, 1500);
        }

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadCountry();

            const params = new URLSearchParams(window.location.search);
            const user = params.get('user');
            if (user && !localStorage.getItem('redirect_after_subscribe')) {
                localStorage.setItem('redirect_after_subscribe', `chat.html?user=${user}`);
            }
        });

        console.log('🪙 ClassyDate Pricing Page loaded!');
        console.log('💰 150 Coins = $13.00');
    </script>

</body>
</html>
