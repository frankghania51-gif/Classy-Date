<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Choose Your Plan | ClassyDate</title>
    <meta name="description" content="Choose your ClassyDate subscription plan.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           CLASSYDATE - PRICING PAGE
           ============================================================ */

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #ACC8E5;
            color: #112A46;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .pricing-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(172, 200, 229, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(17, 42, 70, 0.08);
            padding: 0 20px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .pricing-header .brand {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 24px;
            font-weight: 700;
            color: #112A46;
        }

        .pricing-header .brand span {
            font-family: "Inter", sans-serif;
            font-weight: 300;
            color: #2E5A88;
        }

        .pricing-header .back {
            padding: 8px 20px;
            border-radius: 50px;
            background: rgba(17, 42, 70, 0.08);
            color: #112A46;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            font-family: "Inter", sans-serif;
            transition: all 0.3s ease;
        }

        .pricing-header .back:hover {
            background: rgba(17, 42, 70, 0.15);
        }

        /* Main */
        .pricing-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            min-height: 100vh;
            background: radial-gradient(ellipse at center top, rgba(17, 42, 70, 0.04), transparent 70%);
        }

        .pricing-card {
            max-width: 560px;
            width: 100%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 40px 40px;
            border: 1px solid rgba(255, 255, 255, 0.30);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .pricing-card__header {
            text-align: center;
            margin-bottom: 32px;
        }

        .pricing-card__header .flag {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }

        .pricing-card__header h1 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 28px;
            color: #112A46;
            font-weight: 700;
        }

        .pricing-card__header .subtitle {
            color: rgba(17, 42, 70, 0.5);
            font-size: 15px;
            margin-top: 4px;
            font-family: "Inter", sans-serif;
        }

        /* Steps */
        .steps {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: rgba(17, 42, 70, 0.3);
            font-family: "Inter", sans-serif;
        }

        .step .num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(17, 42, 70, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: rgba(17, 42, 70, 0.2);
        }

        .step.active .num {
            background: #112A46;
            color: #fff;
        }

        .step.active {
            color: #112A46;
        }

        .step .line {
            width: 30px;
            height: 2px;
            background: rgba(17, 42, 70, 0.06);
        }

        .step.active .line {
            background: #112A46;
        }

        /* Country Display */
        .country-display {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .country-display .flag {
            font-size: 32px;
        }

        .country-display .info {
            flex: 1;
        }

        .country-display .info .name {
            font-weight: 700;
            font-size: 16px;
            color: #112A46;
            font-family: "Inter", sans-serif;
        }

        .country-display .info .currency {
            font-size: 13px;
            color: rgba(17, 42, 70, 0.4);
            font-family: "Inter", sans-serif;
        }

        .country-display .edit {
            padding: 6px 14px;
            border-radius: 50px;
            background: rgba(17, 42, 70, 0.08);
            color: #112A46;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: "Inter", sans-serif;
        }

        .country-display .edit:hover {
            background: rgba(17, 42, 70, 0.15);
        }

        /* Pricing Plans */
        .plan {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .plan:hover {
            border-color: rgba(17, 42, 70, 0.2);
            transform: translateY(-2px);
        }

        .plan.selected {
            border-color: #112A46;
            background: rgba(17, 42, 70, 0.04);
        }

        .plan .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .plan .plan-name {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 20px;
            font-weight: 700;
            color: #112A46;
        }

        .plan .plan-badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            background: #112A46;
            font-family: "Inter", sans-serif;
        }

        .plan .plan-badge.popular {
            background: #28a745;
        }

        .plan .plan-price {
            font-size: 28px;
            font-weight: 700;
            color: #112A46;
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
        }

        .plan .plan-price span {
            font-size: 16px;
            font-weight: 400;
            color: rgba(17, 42, 70, 0.4);
            font-family: "Inter", sans-serif;
        }

        .plan .plan-features {
            list-style: none;
            margin-top: 12px;
            display: grid;
            gap: 8px;
        }

        .plan .plan-features li {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: rgba(17, 42, 70, 0.6);
            font-family: "Inter", sans-serif;
        }

        .plan .plan-features li .check {
            color: #28a745;
            font-weight: 700;
        }

        /* Button */
        .btn-subscribe {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #112A46, #2E5A88);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
            margin-top: 8px;
        }

        .btn-subscribe:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(17, 42, 70, 0.35);
            background: linear-gradient(135deg, #2E5A88, #112A46);
        }

        .btn-subscribe:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .pricing-card {
                padding: 32px 24px 28px;
            }

            .pricing-card__header h1 {
                font-size: 24px;
            }

            .steps {
                flex-wrap: wrap;
                justify-content: center;
            }

            .step .line {
                display: none;
            }

            .pricing-header .brand {
                font-size: 20px;
            }

            .plan .plan-price {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="pricing-header">
        <a class="brand" href="/">Classy<span>Date</span></a>
        <button class="back" onclick="history.back()">← Back</button>
    </header>

    <!-- Main -->
    <main class="pricing-wrapper">
        <div class="pricing-card">
            <div class="pricing-card__header">
                <span class="flag" id="country-flag">🌍</span>
                <h1>Choose Your Plan</h1>
                <p class="subtitle" id="country-subtitle">Select a plan for your country</p>
            </div>

            <!-- Steps -->
            <div class="steps">
                <div class="step">
                    <span class="num">✓</span> Details
                    <span class="line"></span>
                </div>
                <div class="step active">
                    <span class="num">2</span> Pricing
                    <span class="line"></span>
                </div>
                <div class="step">
                    <span class="num">3</span> Complete
                </div>
            </div>

            <!-- Country Display -->
            <div class="country-display">
                <span class="flag" id="display-flag">🌍</span>
                <div class="info">
                    <div class="name" id="display-country">Select your country</div>
                    <div class="currency" id="display-currency">Currency: USD</div>
                </div>
                <button class="edit" onclick="history.back()">✏️ Edit</button>
            </div>

            <!-- Plans will be rendered here -->
            <div id="plans-container">
                <!-- Plans inserted by JavaScript -->
            </div>

            <button class="btn-subscribe" id="subscribe-btn" onclick="completeSubscription()">
                💎 Subscribe Now
            </button>
        </div>
    </main>

    <!-- ============================================================ -->
    <!-- SCRIPTS                                                      -->
    <!-- ============================================================ -->
    <script>
        // ============================================================
        // COUNTRY PRICING DATA
        // ============================================================
        const countryData = {
            'zimbabwe': {
                name: 'Zimbabwe',
                flag: '🇿🇼',
                currency: 'USD',
                monthly: 4.99,
                yearly: 49.99,
                currencySymbol: '$'
            },
            'south-africa': {
                name: 'South Africa',
                flag: '🇿🇦',
                currency: 'USD',
                monthly: 6.99,
                yearly: 69.99,
                currencySymbol: '$'
            },
            'zambia': {
                name: 'Zambia',
                flag: '🇿🇲',
                currency: 'USD',
                monthly: 4.99,
                yearly: 49.99,
                currencySymbol: '$'
            },
            'usa': {
                name: 'USA',
                flag: '🇺🇸',
                currency: 'USD',
                monthly: 14.99,
                yearly: 149.99,
                currencySymbol: '$'
            },
            'uk': {
                name: 'United Kingdom',
                flag: '🇬🇧',
                currency: 'GBP',
                monthly: 11.99,
                yearly: 119.99,
                currencySymbol: '£'
            },
            'canada': {
                name: 'Canada',
                flag: '🇨🇦',
                currency: 'CAD',
                monthly: 12.99,
                yearly: 129.99,
                currencySymbol: 'C$'
            },
            'australia': {
                name: 'Australia',
                flag: '🇦🇺',
                currency: 'AUD',
                monthly: 14.99,
                yearly: 149.99,
                currencySymbol: 'A$'
            },
            'nigeria': {
                name: 'Nigeria',
                flag: '🇳🇬',
                currency: 'USD',
                monthly: 5.99,
                yearly: 59.99,
                currencySymbol: '$'
            },
            'kenya': {
                name: 'Kenya',
                flag: '🇰🇪',
                currency: 'USD',
                monthly: 5.99,
                yearly: 59.99,
                currencySymbol: '$'
            },
            'india': {
                name: 'India',
                flag: '🇮🇳',
                currency: 'USD',
                monthly: 3.99,
                yearly: 39.99,
                currencySymbol: '$'
            },
            'philippines': {
                name: 'Philippines',
                flag: '🇵🇭',
                currency: 'USD',
                monthly: 4.99,
                yearly: 49.99,
                currencySymbol: '$'
            },
            'other': {
                name: 'Other Countries',
                flag: '🌍',
                currency: 'USD',
                monthly: 9.99,
                yearly: 99.99,
                currencySymbol: '$'
            }
        };

        // ============================================================
        // GET COUNTRY FROM URL
        // ============================================================
        function getCountryFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('country') || 'other';
        }

        // ============================================================
        // RENDER PLANS
        // ============================================================
        function renderPlans(countryCode) {
            const data = countryData[countryCode] || countryData['other'];
            const container = document.getElementById('plans-container');

            // Update display
            document.getElementById('country-flag').textContent = data.flag;
            document.getElementById('country-subtitle').textContent = `Selected: ${data.name}`;
            document.getElementById('display-flag').textContent = data.flag;
            document.getElementById('display-country').textContent = data.name;
            document.getElementById('display-currency').textContent = `Currency: ${data.currency}`;

            // Calculate savings
            const monthlyTotal = data.monthly * 12;
            const yearlySavings = Math.round((monthlyTotal - data.yearly) / monthlyTotal * 100);

            container.innerHTML = `
                <div class="plan selected" id="plan-monthly" onclick="selectPlan('monthly')">
                    <div class="plan-header">
                        <span class="plan-name">Monthly Plan</span>
                        <span class="plan-badge">Flexible</span>
                    </div>
                    <div class="plan-price">
                        ${data.currencySymbol}${data.monthly} <span>/ month</span>
                    </div>
                    <ul class="plan-features">
                        <li><span class="check">✓</span> Unlimited messages</li>
                        <li><span class="check">✓</span> See who likes you</li>
                        <li><span class="check">✓</span> Premium badge</li>
                        <li><span class="check">✓</span> Cancel anytime</li>
                    </ul>
                </div>

                <div class="plan" id="plan-yearly" onclick="selectPlan('yearly')">
                    <div class="plan-header">
                        <span class="plan-name">Yearly Plan</span>
                        <span class="plan-badge popular">🔥 Best Value</span>
                    </div>
                    <div class="plan-price">
                        ${data.currencySymbol}${data.yearly} <span>/ year</span>
                    </div>
                    <div style="font-size:13px;color:#28a745;font-weight:600;margin-top:4px;font-family:'Inter',sans-serif;">
                        Save ${yearlySavings}% compared to monthly
                    </div>
                    <ul class="plan-features">
                        <li><span class="check">✓</span> All monthly features</li>
                        <li><span class="check">✓</span> ${yearlySavings}% savings</li>
                        <li><span class="check">✓</span> Priority support</li>
                        <li><span class="check">✓</span> Free trial included</li>
                    </ul>
                </div>
            `;

            // Store selected plan
            window.selectedPlan = 'monthly';
        }

        // ============================================================
        // SELECT PLAN
        // ============================================================
        function selectPlan(plan) {
            window.selectedPlan = plan;
            document.querySelectorAll('.plan').forEach(el => el.classList.remove('selected'));
            document.getElementById(`plan-${plan}`).classList.add('selected');
        }

        // ============================================================
        // COMPLETE SUBSCRIPTION
        // ============================================================
        function completeSubscription() {
            const btn = document.getElementById('subscribe-btn');
            btn.textContent = '⏳ Processing...';
            btn.disabled = true;

            // Mark user as subscribed
            localStorage.setItem('classydate_subscribed', 'true');

            // Get redirect URL
            const redirect = localStorage.getItem('redirect_after_subscribe') || 'members.html';

            setTimeout(() => {
                window.location.href = redirect;
            }, 1500);
        }

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            const country = getCountryFromURL();
            renderPlans(country);

            const params = new URLSearchParams(window.location.search);
            const user = params.get('user');
            if (user && !localStorage.getItem('redirect_after_subscribe')) {
                localStorage.setItem('redirect_after_subscribe', `chat.html?user=${user}`);
            }
        });

        console.log('💎 ClassyDate Pricing Page loaded!');
    </script>

</body>
</html>
