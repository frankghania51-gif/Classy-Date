<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | ClassyDate</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           CLASSYDATE - ADMIN LOGIN PAGE
           Colors: Navy #112A46 | Soft Blue #ACC8E5
           ============================================================ */

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #ACC8E5;
            color: #112A46;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Header */
        .login-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(172, 200, 229, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(17, 42, 70, 0.08);
            padding: 0 20px;
            height: 72px;
            display: flex;
            align-items: center;
        }

        .login-header .brand {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 24px;
            font-weight: 700;
            color: #112A46;
        }

        .login-header .brand span {
            font-family: "Inter", sans-serif;
            font-weight: 300;
            color: #2E5A88;
        }

        /* Main */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            min-height: 100vh;
            background: radial-gradient(ellipse at center top, rgba(17, 42, 70, 0.04), transparent 70%);
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 40px 40px;
            border: 1px solid rgba(255, 255, 255, 0.30);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .login-card__header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-card__header .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }

        .login-card__header h1 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 28px;
            color: #112A46;
            font-weight: 700;
        }

        .login-card__header p {
            color: rgba(17, 42, 70, 0.5);
            font-size: 14px;
            margin-top: 4px;
            font-family: "Inter", sans-serif;
        }

        /* Form */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(17, 42, 70, 0.7);
            margin-bottom: 6px;
            font-family: "Inter", sans-serif;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: #112A46;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
            font-family: "Inter", sans-serif;
        }

        .form-group input::placeholder {
            color: rgba(17, 42, 70, 0.3);
        }

        .form-group input:focus {
            border-color: #112A46;
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 0 4px rgba(17, 42, 70, 0.08);
        }

        /* Button */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #112A46, #2E5A88);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(17, 42, 70, 0.35);
            background: linear-gradient(135deg, #2E5A88, #112A46);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Error */
        .error-message {
            display: none;
            background: rgba(220, 53, 69, 0.08);
            border: 1px solid rgba(220, 53, 69, 0.15);
            border-radius: 12px;
            padding: 12px 16px;
            color: #dc3545;
            font-size: 14px;
            margin-bottom: 16px;
            font-family: "Inter", sans-serif;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 20px;
        }

        .login-footer p {
            color: rgba(17, 42, 70, 0.3);
            font-size: 13px;
            font-family: "Inter", sans-serif;
        }

        .login-footer a {
            color: #112A46;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 24px;
            background: #112A46;
            color: #fff;
            border-radius: 12px;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            font-size: 14px;
            z-index: 999;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: #28a745;
        }

        .toast.error {
            background: #dc3545;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .btn-login.loading .spinner {
            display: inline-block;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px 28px;
            }
            .login-card__header h1 {
                font-size: 24px;
            }
            .login-header .brand {
                font-size: 20px;
            }
            .toast {
                bottom: 20px;
                right: 20px;
                left: 20px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="login-header">
        <a class="brand" href="/">Classy<span>Date</span></a>
    </header>

    <!-- Main -->
    <main class="login-wrapper">
        <div class="login-card">
            <div class="login-card__header">
                <span class="icon">🔑</span>
                <h1>Admin Login</h1>
                <p>Enter your credentials to access the admin panel</p>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="error-message">
                ⚠️ Invalid email or password. Please try again.
            </div>

            <!-- Form -->
            <form id="login-form" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="admin@classydate.com" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-login" id="login-btn">
                    <span class="spinner"></span>
                    <span class="btn-text">🔓 Login</span>
                </button>
            </form>

            <div class="login-footer">
                <p><a href="index.html">← Back to Home</a></p>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- ============================================================ -->
    <!-- SCRIPTS - Firebase Auth                                      -->
    <!-- ============================================================ -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js"
            }
        }
    </script>

    <script type="module">
        // ============================================================
        // FIREBASE CONFIG
        // ============================================================
        import { initializeApp } from "firebase/app";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            onAuthStateChanged,
            setPersistence,
            browserLocalPersistence
        } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyACEYbex1YBpqeH7c2bbFk-9AA7iYe_NXU",
            authDomain: "classydate-ff97f.firebaseapp.com",
            projectId: "classydate-ff97f",
            storageBucket: "classydate-ff97f.firebasestorage.app",
            messagingSenderId: "241438852209",
            appId: "1:241438852209:web:00e9af320aa28becd307d0",
            measurementId: "G-TET9ZFZD0P"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ============================================================
        // ADMIN CREDENTIALS
        // ============================================================
        const ADMIN_EMAIL = "admin@classydate.com";

        // ============================================================
        // CHECK IF ALREADY LOGGED IN
        // ============================================================
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === ADMIN_EMAIL) {
                // Already logged in as admin → go to admin panel
                window.location.href = 'adminpanel.html';
            }
        });

        // ============================================================
        // HANDLE LOGIN
        // ============================================================
        window.handleLogin = async function(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMessage = document.getElementById('error-message');
            const loginBtn = document.getElementById('login-btn');

            // Hide previous messages
            errorMessage.classList.remove('show');

            // Validation
            if (!email || !password) {
                errorMessage.textContent = '⚠️ Please fill in all fields.';
                errorMessage.classList.add('show');
                return false;
            }

            // Show loading
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;

            try {
                // Sign in with Firebase
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Check if admin
                if (user.email !== ADMIN_EMAIL) {
                    // Not admin
                    errorMessage.textContent = '⛔ Access denied. Admin only!';
                    errorMessage.classList.add('show');
                    await auth.signOut();
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                    return false;
                }

                // ✅ Admin login successful
                showToast('✅ Login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'adminpanel.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);

                let errorMsg = '⚠️ Login failed. ';
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMsg += 'No account found with this email.';
                        break;
                    case 'auth/wrong-password':
                        errorMsg += 'Incorrect password. Please try again.';
                        break;
                    case 'auth/too-many-requests':
                        errorMsg += 'Too many failed attempts. Please try again later.';
                        break;
                    case 'auth/invalid-email':
                        errorMsg += 'Please enter a valid email address.';
                        break;
                    default:
                        errorMsg += error.message;
                }

                errorMessage.textContent = errorMsg;
                errorMessage.classList.add('show');
            }

            loginBtn.classList.remove('loading');
            loginBtn.disabled = false;
            return false;
        }

        // ============================================================
        // TOAST
        // ============================================================
        let toastTimeout;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        console.log('🔐 ClassyDate Admin Login Page loaded!');
        console.log('📧 Admin: admin@classydate.com');
    </script>

</body>
</html>
