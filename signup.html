<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Members | ClassyDate</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #ACC8E5;
            color: #112A46;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .cb-shell-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(172, 200, 229, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(17, 42, 70, 0.08);
        }

        .cb-shell-header__inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cb-shell-brand {
            display: flex;
            align-items: center;
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 22px;
            font-weight: 700;
            color: #112A46;
        }
        .cb-shell-brand span {
            font-family: "Inter", sans-serif;
            font-weight: 300;
            color: #2E5A88;
        }

        .cb-shell-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cb-shell-button {
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: "Inter", sans-serif;
        }

        .cb-shell-button--secondary {
            background: rgba(17, 42, 70, 0.1);
            color: #112A46;
            border: 1px solid rgba(17, 42, 70, 0.12);
        }
        .cb-shell-button--secondary:hover {
            background: rgba(17, 42, 70, 0.18);
        }

        .cb-shell-button--primary {
            background: #112A46;
            color: #fff;
        }
        .cb-shell-button--primary:hover {
            background: #2E5A88;
            transform: translateY(-2px);
        }

        .members-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px 60px;
        }

        .members-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .members-header h1 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 36px;
            color: #112A46;
            font-weight: 700;
        }

        .members-header p {
            color: rgba(17, 42, 70, 0.5);
            font-size: 16px;
            margin-top: 4px;
        }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        .member-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.20);
            transition: all 0.3s ease;
            text-align: center;
        }

        .member-card:hover {
            transform: translateY(-4px);
            border-color: rgba(17, 42, 70, 0.15);
            box-shadow: 0 8px 30px rgba(17, 42, 70, 0.08);
        }

        .member-card .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 12px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            display: block;
        }

        .member-card .name {
            font-size: 18px;
            font-weight: 700;
            color: #112A46;
        }

        .member-card .location {
            font-size: 14px;
            color: rgba(17, 42, 70, 0.4);
            margin-top: 2px;
        }

        .member-card .badges {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .badge-small {
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 600;
            font-family: "Inter", sans-serif;
            display: inline-block;
        }

        .badge-small--verified {
            background: rgba(40, 167, 69, 0.12);
            color: #28a745;
        }

        .badge-small--premium {
            background: rgba(255, 215, 0, 0.12);
            color: #b8960f;
        }

        .member-card .interests {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
        }

        .member-card .interests span {
            background: rgba(17, 42, 70, 0.06);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            color: rgba(17, 42, 70, 0.5);
        }

        .loading-text {
            text-align: center;
            padding: 60px 20px;
            color: rgba(17, 42, 70, 0.3);
        }

        .loading-text .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(17, 42, 70, 0.1);
            border-top-color: #112A46;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-members {
            text-align: center;
            padding: 60px 20px;
            color: rgba(17, 42, 70, 0.3);
        }

        .no-members .icon {
            font-size: 64px;
            display: block;
            margin-bottom: 12px;
        }

        .no-members h3 {
            color: #112A46;
            font-size: 20px;
            font-family: "Playfair Display", serif;
        }

        .no-members p {
            color: rgba(17, 42, 70, 0.4);
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .members-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 16px;
            }

            .members-header h1 {
                font-size: 28px;
            }

            .cb-shell-header__inner {
                height: 60px;
                padding: 0 12px;
            }

            .cb-shell-brand {
                font-size: 18px;
            }

            .cb-shell-button {
                padding: 4px 12px;
                font-size: 11px;
            }

            .members-wrapper {
                padding: 76px 12px 40px;
            }
        }
    </style>
</head>
<body>

    <header class="cb-shell-header" role="banner">
        <div class="cb-shell-header__inner">
            <a class="cb-shell-brand" href="index.html">
                Classy<span>Date</span>
            </a>
            <div class="cb-shell-actions">
                <a href="members.html" class="cb-shell-button cb-shell-button--secondary">Members</a>
                <a href="login.html" class="cb-shell-button cb-shell-button--secondary">Log in</a>
                <a href="signup.html" class="cb-shell-button cb-shell-button--primary">Join</a>
            </div>
        </div>
    </header>

    <main class="members-wrapper">
        <div class="members-header">
            <h1>Our Members</h1>
            <p>Connect with amazing people</p>
        </div>

        <div id="members-container">
            <div class="loading-text">
                <div class="spinner"></div>
                <br><br>Loading members...
            </div>
        </div>
    </main>

    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
            }
        }
    </script>

    <script type="module">
        import { createClient } from "@supabase/supabase-js";

        const SUPABASE_URL = 'https://ehfnzsfnsoiyiwpxqmli.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ybgZxnGuU_Gt35rfqkEdBw_YkEdD8vl';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        console.log('🔗 Supabase connected!');

        async function loadMembers() {
            const container = document.getElementById('members-container');

            try {
                // 🔥 KEY: Only load members where verified = true (admin-created)
                const { data, error } = await supabase
                    .from('members')
                    .select('*')
                    .eq('verified', true) // 🔥 This is the key filter!
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const members = data || [];

                console.log('📊 Admin members loaded:', members.length);

                if (members.length === 0) {
                    container.innerHTML = `
                        <div class="no-members">
                            <span class="icon">💎</span>
                            <h3>No members yet</h3>
                            <p>Check back soon for amazing people!</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = `
                    <div class="members-grid">
                        ${members.map(m => {
                            let avatar = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(m.name || 'User') + '&background=112A46&color=fff&size=100';
                            if (m.photo_file_ids && m.photo_file_ids.length > 0) {
                                const { data } = supabase.storage.from('member_photos').getPublicUrl(m.photo_file_ids[0]);
                                if (data && data.publicUrl) {
                                    avatar = data.publicUrl;
                                }
                            }

                            const badges = `
                                ${m.verified ? '<span class="badge-small badge-small--verified">✅ Verified</span>' : ''}
                                ${m.premium ? '<span class="badge-small badge-small--premium">⭐ Premium</span>' : ''}
                            `;

                            const interests = (m.interests || []).map(i => `<span>${i}</span>`).join('');

                            return `
                                <div class="member-card">
                                    <img class="avatar" src="${avatar}" alt="${m.name}" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(m.name || 'User')}&background=112A46&color=fff&size=100'">
                                    <div class="name">${m.name || 'Unknown'}</div>
                                    <div class="location">${m.location || '📍 Unknown'}</div>
                                    <div class="badges">${badges}</div>
                                    ${interests ? `<div class="interests">${interests}</div>` : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;

            } catch (error) {
                console.error('Error loading members:', error);
                container.innerHTML = `
                    <div class="no-members">
                        <span class="icon">⚠️</span>
                        <h3>Error loading members</h3>
                        <p>Please try again later.</p>
                    </div>
                `;
            }
        }

        loadMembers();

        console.log('💎 Members page loaded!');
        console.log('✅ Only showing admin-created members (verified = true)');
        console.log('❌ Regular sign-ups (verified = false) are hidden');
    </script>

</body>
</html>
