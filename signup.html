<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Sign Up | ClassyDate</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #ACC8E5;
            color: #112A46;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .cb-shell-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(172, 200, 229, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(17, 42, 70, 0.08);
        }

        .cb-shell-header__inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cb-shell-brand {
            display: flex;
            align-items: center;
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 24px;
            font-weight: 700;
            color: #112A46;
        }
        .cb-shell-brand span {
            font-family: "Inter", sans-serif;
            font-weight: 300;
            color: #2E5A88;
        }

        .cb-shell-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cb-shell-button {
            padding: 8px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: "Inter", sans-serif;
        }

        .cb-shell-button--secondary {
            background: rgba(17, 42, 70, 0.1);
            color: #112A46;
            border: 1px solid rgba(17, 42, 70, 0.12);
        }
        .cb-shell-button--secondary:hover {
            background: rgba(17, 42, 70, 0.18);
        }

        .cb-shell-button--primary {
            background: #112A46;
            color: #fff;
        }
        .cb-shell-button--primary:hover {
            background: #2E5A88;
            transform: translateY(-2px);
        }

        .signup-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            min-height: 100vh;
            background: radial-gradient(ellipse at center top, rgba(17, 42, 70, 0.04), transparent 70%);
        }

        .signup-card {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 40px 40px;
            border: 1px solid rgba(255, 255, 255, 0.30);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .signup-card__header {
            text-align: center;
            margin-bottom: 32px;
        }

        .signup-card__header .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }

        .signup-card__header h1 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 32px;
            color: #112A46;
            font-weight: 700;
        }

        .signup-card__header p {
            color: rgba(17, 42, 70, 0.6);
            font-size: 15px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(17, 42, 70, 0.7);
            margin-bottom: 6px;
        }

        .form-group label .required {
            color: #dc3545;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: #112A46;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
            font-family: "Inter", sans-serif;
        }

        .form-group input::placeholder {
            color: rgba(17, 42, 70, 0.3);
        }

        .form-group input:focus {
            border-color: #112A46;
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 0 4px rgba(17, 42, 70, 0.08);
        }

        .btn-signup {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #112A46, #2E5A88);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
            margin-top: 8px;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(17, 42, 70, 0.35);
        }

        .btn-signup:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            display: none;
            background: rgba(220, 53, 69, 0.08);
            border: 1px solid rgba(220, 53, 69, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            color: #dc3545;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            display: none;
            background: rgba(40, 167, 69, 0.08);
            border: 1px solid rgba(40, 167, 69, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            color: #28a745;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .success-message.show {
            display: block;
        }

        .signup-footer {
            text-align: center;
            margin-top: 24px;
        }

        .signup-footer p {
            color: rgba(17, 42, 70, 0.5);
            font-size: 14px;
        }

        .signup-footer a {
            color: #112A46;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .signup-footer a:hover {
            color: #2E5A88;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .signup-card {
                padding: 32px 24px 28px;
            }

            .signup-card__header h1 {
                font-size: 26px;
            }

            .cb-shell-header__inner {
                height: 64px;
                padding: 0 16px;
            }

            .cb-shell-brand {
                font-size: 20px;
            }

            .cb-shell-button {
                padding: 6px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <header class="cb-shell-header" role="banner">
        <div class="cb-shell-header__inner">
            <a class="cb-shell-brand" href="/">
                Classy<span>Date</span>
            </a>
            <div class="cb-shell-actions">
                <a href="signup.html" class="cb-shell-button cb-shell-button--secondary">Join</a>
                <a href="login.html" class="cb-shell-button cb-shell-button--primary">Log in</a>
            </div>
        </div>
    </header>

    <main class="signup-wrapper">
        <div class="signup-card">
            <div class="signup-card__header">
                <span class="icon">💎</span>
                <h1>Create Account</h1>
                <p>Join ClassyDate and start your journey</p>
            </div>

            <div class="error-message" id="error-message"></div>
            <div class="success-message" id="success-message"></div>

            <form id="signup-form" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="fullname">Full Name <span class="required">*</span></label>
                    <input type="text" id="fullname" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                </div>

                <button type="submit" class="btn-signup" id="signup-btn">💎 Create Account</button>
            </form>

            <div class="signup-footer">
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </div>
    </main>

    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
            }
        }
    </script>

    <script type="module">
        import { createClient } from "@supabase/supabase-js";

        // Supabase config
        const SUPABASE_URL = 'https://ehfnzsfnsoiyiwpxqmli.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ybgZxnGuU_Gt35rfqkEdBw_YkEdD8vl';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        console.log('🔗 Supabase connected!');

        window.handleSignup = async function(event) {
            event.preventDefault();

            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            const btn = document.getElementById('signup-btn');

            // Hide previous messages
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            // Validation
            if (!fullname || fullname.length < 2) {
                errorMessage.textContent = '⚠️ Please enter your full name.';
                errorMessage.classList.add('show');
                return;
            }

            if (!email || !email.includes('@')) {
                errorMessage.textContent = '⚠️ Please enter a valid email address.';
                errorMessage.classList.add('show');
                return;
            }

            if (!password || password.length < 6) {
                errorMessage.textContent = '⚠️ Password must be at least 6 characters.';
                errorMessage.classList.add('show');
                return;
            }

            // Show loading
            btn.textContent = '⏳ Creating account...';
            btn.disabled = true;

            try {
                // Check if email already exists
                const { data: existingUser } = await supabase
                    .from('members')
                    .select('email')
                    .eq('email', email)
                    .maybeSingle();

                if (existingUser) {
                    errorMessage.textContent = '⚠️ This email is already registered. Please log in.';
                    errorMessage.classList.add('show');
                    btn.textContent = '💎 Create Account';
                    btn.disabled = false;
                    return;
                }

                // Create user data - IMPORTANT: verified = false so they don't appear on members page
                const userData = {
                    name: fullname,
                    email: email,
                    age: 25, // Default age
                    gender: 'other', // Default gender
                    location: '',
                    bio: '',
                    interests: [],
                    photo_file_ids: [],
                    online: false,
                    verified: false, // 🔥 KEY: This prevents them from showing on members page
                    premium: false,
                    joined: new Date().toISOString().slice(0, 10),
                    created_at: new Date().toISOString()
                };

                console.log('📤 Creating account...');

                const { data, error } = await supabase
                    .from('members')
                    .insert([userData])
                    .select();

                if (error) {
                    console.error('Insert error:', error);
                    throw error;
                }

                console.log('✅ Account created:', data);

                // Store user session
                if (data && data[0]) {
                    localStorage.setItem('classy_user', JSON.stringify(data[0]));
                    localStorage.setItem('classy_user_email', email);
                    localStorage.setItem('classy_user_name', fullname);
                }

                // Show success
                successMessage.textContent = '✅ Account created successfully!';
                successMessage.classList.add('show');

                btn.textContent = '✅ Welcome!';
                btn.style.background = 'linear-gradient(135deg, #28a745, #007E33)';

                // Redirect to members page
                setTimeout(() => {
                    window.location.href = 'members.html';
                }, 1500);

            } catch (error) {
                console.error('❌ Signup error:', error);
                errorMessage.textContent = '⚠️ ' + (error.message || 'Failed to create account. Please try again.');
                errorMessage.classList.add('show');

                btn.textContent = '💎 Create Account';
                btn.disabled = false;
                btn.style.background = 'linear-gradient(135deg, #112A46, #2E5A88)';
            }
        };

        // Clear messages on input
        document.querySelectorAll('input').forEach(function(input) {
            input.addEventListener('input', function() {
                document.getElementById('error-message').classList.remove('show');
                document.getElementById('success-message').classList.remove('show');
            });
        });

        console.log('💎 Sign Up Page Ready!');
        console.log('✅ Users sign up and go to members page');
        console.log('❌ Users DO NOT appear on members page (verified: false)');
        console.log('👑 Only admin-created members appear on members page');
    </script>

</body>
</html>
