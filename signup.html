<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Sign Up | ClassyDate</title>
    <meta name="description" content="Sign up for ClassyDate and start connecting with meaningful relationships. Join today!">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #ACC8E5;
            color: #112A46;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; }

        /* Header */
        .cb-shell-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(172, 200, 229, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(17, 42, 70, 0.08);
        }

        .cb-shell-header__inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cb-shell-brand {
            display: flex;
            align-items: center;
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 24px;
            font-weight: 700;
            color: #112A46;
        }
        .cb-shell-brand span {
            font-family: "Inter", sans-serif;
            font-weight: 300;
            color: #2E5A88;
        }

        .cb-shell-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cb-shell-button {
            padding: 8px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: "Inter", sans-serif;
        }
        .cb-shell-button--secondary {
            background: rgba(17, 42, 70, 0.1);
            color: #112A46;
            border: 1px solid rgba(17, 42, 70, 0.12);
        }
        .cb-shell-button--secondary:hover {
            background: rgba(17, 42, 70, 0.18);
        }
        .cb-shell-button--primary {
            background: #112A46;
            color: #fff;
        }
        .cb-shell-button--primary:hover {
            background: #2E5A88;
            transform: translateY(-2px);
        }

        /* Signup Container */
        .signup-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            min-height: 100vh;
            background: radial-gradient(ellipse at center top, rgba(17, 42, 70, 0.04), transparent 70%);
        }

        .signup-card {
            max-width: 440px;
            width: 100%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 40px 40px;
            border: 1px solid rgba(255, 255, 255, 0.30);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .signup-card__header {
            text-align: center;
            margin-bottom: 32px;
        }

        .signup-card__header .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }

        .signup-card__header h1 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 28px;
            color: #112A46;
            font-weight: 700;
        }

        .signup-card__header p {
            color: rgba(17, 42, 70, 0.5);
            font-size: 15px;
            margin-top: 4px;
            font-family: "Inter", sans-serif;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(17, 42, 70, 0.7);
            margin-bottom: 6px;
            font-family: "Inter", sans-serif;
        }

        .form-group label .required {
            color: #dc3545;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: #112A46;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
            font-family: "Inter", sans-serif;
        }

        .form-group input::placeholder {
            color: rgba(17, 42, 70, 0.3);
        }

        .form-group input:focus {
            border-color: #112A46;
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 0 4px rgba(17, 42, 70, 0.08);
        }

        .btn-signup {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #112A46, #2E5A88);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
            margin-top: 8px;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(17, 42, 70, 0.35);
            background: linear-gradient(135deg, #2E5A88, #112A46);
        }

        .btn-signup:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            display: none;
            background: rgba(220, 53, 69, 0.08);
            border: 1px solid rgba(220, 53, 69, 0.15);
            border-radius: 12px;
            padding: 12px 16px;
            color: #dc3545;
            font-size: 14px;
            margin-bottom: 16px;
            font-family: "Inter", sans-serif;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        .success-message {
            display: none;
            background: rgba(0, 200, 81, 0.10);
            border: 1px solid rgba(0, 200, 81, 0.20);
            border-radius: 12px;
            padding: 12px 16px;
            color: #007E33;
            font-size: 14px;
            margin-bottom: 16px;
            font-family: "Inter", sans-serif;
        }

        .success-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
        }

        .login-footer p {
            color: rgba(17, 42, 70, 0.3);
            font-size: 13px;
            font-family: "Inter", sans-serif;
        }

        .login-footer a {
            color: #112A46;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 24px;
            background: #112A46;
            color: #fff;
            border-radius: 12px;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            font-size: 14px;
            z-index: 999;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success {
            background: #28a745;
        }
        .toast.error {
            background: #dc3545;
        }

        @media (max-width: 480px) {
            .signup-card {
                padding: 32px 24px 28px;
            }
            .signup-card__header h1 {
                font-size: 24px;
            }
            .cb-shell-header__inner {
                height: 64px;
                padding: 0 16px;
            }
            .cb-shell-brand {
                font-size: 20px;
            }
            .cb-shell-button {
                padding: 6px 16px;
                font-size: 12px;
            }
            .toast {
                bottom: 20px;
                right: 20px;
                left: 20px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="cb-shell-header" role="banner">
        <div class="cb-shell-header__inner">
            <a class="cb-shell-brand" href="/">
                Classy<span>Date</span>
            </a>

            <div class="cb-shell-actions">
                <a href="signup.html" class="cb-shell-button cb-shell-button--secondary">Join</a>
                <a href="login.html" class="cb-shell-button cb-shell-button--primary">Log in</a>
            </div>
        </div>
    </header>

    <!-- Signup Form -->
    <main class="signup-wrapper">
        <div class="signup-card">
            <div class="signup-card__header">
                <span class="icon">💎</span>
                <h1>Create Your Account</h1>
                <p>Join ClassyDate and start your love journey</p>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="error-message">
                ⚠️ Please fix the errors below.
            </div>

            <!-- Success Message -->
            <div class="success-message" id="success-message">
                ✅ Account created successfully! Redirecting...
            </div>

            <form id="signup-form" onsubmit="return handleSignup(event)">
                <div class="form-group">
                    <label for="fullname">Full Name <span class="required">*</span></label>
                    <input type="text" id="fullname" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-signup" id="signup-btn">Sign up</button>
            </form>

            <div class="login-footer">
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- ============================================================ -->
    <!-- SCRIPTS - FIREBASE AUTH (SIMPLE & WORKING)                   -->
    <!-- ============================================================ -->
    <script>
        // ============================================================
        // FIREBASE CONFIG - YOUR CONFIG HERE!
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyACEYbex1YBpqeH7c2bbFk-9AA7iYe_NXU",
            authDomain: "classydate-ff97f.firebaseapp.com",
            projectId: "classydate-ff97f",
            storageBucket: "classydate-ff97f.firebasestorage.app",
            messagingSenderId: "241438852209",
            appId: "1:241438852209:web:00e9af320aa28becd307d0",
            measurementId: "G-TET9ZFZD0P"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        console.log('🔥 Firebase Auth connected!');

        // ============================================================
        // CHECK IF USER IS ALREADY LOGGED IN
        // ============================================================
        auth.onAuthStateChanged(function(user) {
            if (user) {
                console.log('✅ User already logged in:', user.email);
                window.location.href = 'members.html';
            }
        });

        // ============================================================
        // HANDLE SIGNUP - SIMPLE & WORKING
        // ============================================================
        window.handleSignup = function(event) {
            event.preventDefault();

            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            const btn = document.getElementById('signup-btn');

            // Hide previous messages
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            // Validation
            if (!fullname || fullname.length < 2) {
                errorMessage.textContent = '⚠️ Please enter your full name.';
                errorMessage.classList.add('show');
                return false;
            }

            if (!email || !email.includes('@') || !email.includes('.')) {
                errorMessage.textContent = '⚠️ Please enter a valid email address.';
                errorMessage.classList.add('show');
                return false;
            }

            if (!password || password.length < 6) {
                errorMessage.textContent = '⚠️ Password must be at least 6 characters.';
                errorMessage.classList.add('show');
                return false;
            }

            // Show loading state
            btn.textContent = '⏳ Creating account...';
            btn.disabled = true;

            // 🔥 Create user with Firebase Auth
            auth.createUserWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    const user = userCredential.user;
                    console.log('✅ Account created for:', email);

                    // Update profile with display name
                    user.updateProfile({
                        displayName: fullname
                    }).then(function() {
                        console.log('✅ Display name updated:', fullname);
                    }).catch(function(error) {
                        console.warn('⚠️ Could not update display name:', error);
                    });

                    // Save user info
                    localStorage.setItem('classydate_user', JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        displayName: fullname
                    }));

                    // Show success
                    successMessage.textContent = '✅ Account created successfully! Redirecting...';
                    successMessage.classList.add('show');

                    btn.textContent = '✅ Welcome!';
                    btn.style.background = 'linear-gradient(135deg, #00C851, #007E33)';

                    // Redirect to members page
                    setTimeout(function() {
                        window.location.href = 'members.html';
                    }, 1500);

                })
                .catch(function(error) {
                    console.error('Signup error:', error);

                    let errorMsg = '⚠️ Signup failed. ';
                    switch (error.code) {
                        case 'auth/email-already-in-use':
                            errorMsg += 'This email is already registered. Please log in.';
                            break;
                        case 'auth/invalid-email':
                            errorMsg += 'Please enter a valid email address.';
                            break;
                        case 'auth/weak-password':
                            errorMsg += 'Password is too weak. Please use at least 6 characters.';
                            break;
                        case 'auth/too-many-requests':
                            errorMsg += 'Too many attempts. Please try again later.';
                            break;
                        default:
                            errorMsg += error.message;
                    }

                    errorMessage.textContent = errorMsg;
                    errorMessage.classList.add('show');

                    btn.textContent = 'Sign up';
                    btn.disabled = false;
                    btn.style.background = 'linear-gradient(135deg, #112A46, #2E5A88)';
                });

            return false;
        }

        // ============================================================
        // REAL-TIME VALIDATION CLEARING
        // ============================================================
        document.querySelectorAll('input').forEach(function(input) {
            input.addEventListener('input', function() {
                document.getElementById('error-message').classList.remove('show');
                document.getElementById('success-message').classList.remove('show');
                const btn = document.getElementById('signup-btn');
                btn.textContent = 'Sign up';
                btn.style.background = 'linear-gradient(135deg, #112A46, #2E5A88)';
                btn.disabled = false;
            });
        });

        console.log('💎 ClassyDate Sign Up Page - Firebase Version!');
        console.log('🔐 Simple email + password signup - NO rate limit issues!');
    </script>

</body>
</html>
