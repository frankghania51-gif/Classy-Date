<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Log In | ClassyDate</title>
    <meta name="description" content="Log in to your ClassyDate account and start connecting with meaningful relationships.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           CLASSYDATE - LOGIN PAGE - ULTIMATE HOT VERSION
           Colors: Navy #112A46 | Soft Blue #ACC8E5
           ============================================================ */

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #ACC8E5;
            color: #112A46;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ============================================================ */
        /* HEADER                                                       */
        /* ============================================================ */
        .cb-shell-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(172, 200, 229, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(17, 42, 70, 0.08);
        }

        .cb-shell-header__inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cb-shell-brand {
            display: flex;
            align-items: center;
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 24px;
            font-weight: 700;
            color: #112A46;
        }
        .cb-shell-brand span {
            font-family: "Inter", sans-serif;
            font-weight: 300;
            color: #2E5A88;
        }
        .cb-shell-brand .icon {
            display: none;
        }

        .cb-shell-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cb-shell-button {
            padding: 8px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: "Inter", sans-serif;
        }
        .cb-shell-button--secondary {
            background: rgba(17, 42, 70, 0.1);
            color: #112A46;
            border: 1px solid rgba(17, 42, 70, 0.12);
        }
        .cb-shell-button--secondary:hover {
            background: rgba(17, 42, 70, 0.18);
        }
        .cb-shell-button--primary {
            background: #112A46;
            color: #fff;
        }
        .cb-shell-button--primary:hover {
            background: #2E5A88;
            transform: translateY(-2px);
        }

        /* ============================================================ */
        /* LOGIN CONTAINER                                              */
        /* ============================================================ */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            background: radial-gradient(ellipse at center top, rgba(17, 42, 70, 0.04), transparent 70%);
        }

        /* Floating Hearts */
        .floating-hearts-login {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .heart-login {
            position: absolute;
            animation: floatUpLogin 14s infinite linear;
            opacity: 0;
        }
        @keyframes floatUpLogin {
            0% { transform: translateY(100vh) rotate(0deg) scale(0); opacity: 0; }
            10% { opacity: 0.3; transform: translateY(90vh) rotate(10deg) scale(1); }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) rotate(720deg) scale(0.5); opacity: 0; }
        }

        /* ============================================================ */
        /* LOGIN CARD                                                  */
        /* ============================================================ */
        .login-card {
            max-width: 440px;
            width: 100%;
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 40px 40px;
            border: 1px solid rgba(255, 255, 255, 0.30);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .login-card__header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-card__header .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }

        .login-card__header h1 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 32px;
            color: #112A46;
            font-weight: 700;
        }

        .login-card__header p {
            color: rgba(17, 42, 70, 0.6);
            font-size: 15px;
            margin-top: 4px;
            font-family: "Inter", sans-serif;
        }

        /* ============================================================ */
        /* FORM                                                        */
        /* ============================================================ */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(17, 42, 70, 0.7);
            margin-bottom: 6px;
            font-family: "Inter", sans-serif;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: #112A46;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
            font-family: "Inter", sans-serif;
        }

        .form-group input::placeholder {
            color: rgba(17, 42, 70, 0.3);
        }

        .form-group input:focus {
            border-color: #112A46;
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 0 4px rgba(17, 42, 70, 0.08);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(17, 42, 70, 0.6);
            font-size: 14px;
            cursor: pointer;
            font-family: "Inter", sans-serif;
        }

        .form-options label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #112A46;
            cursor: pointer;
        }

        .form-options a {
            color: rgba(17, 42, 70, 0.5);
            font-size: 14px;
            transition: color 0.3s ease;
            font-family: "Inter", sans-serif;
        }

        .form-options a:hover {
            color: #112A46;
        }

        /* ============================================================ */
        /* BUTTONS                                                      */
        /* ============================================================ */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #112A46, #2E5A88);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(17, 42, 70, 0.35);
            background: linear-gradient(135deg, #2E5A88, #112A46);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* ============================================================ */
        /* DIVIDER                                                      */
        /* ============================================================ */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: rgba(17, 42, 70, 0.2);
            font-size: 13px;
            font-family: "Inter", sans-serif;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(17, 42, 70, 0.1);
        }

        /* ============================================================ */
        /* SOCIAL LOGIN                                                */
        /* ============================================================ */
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #112A46;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(17, 42, 70, 0.2);
            transform: translateY(-2px);
        }

        .social-btn .icon {
            font-size: 20px;
        }

        /* ============================================================ */
        /* FOOTER LINK                                                 */
        /* ============================================================ */
        .login-footer {
            text-align: center;
            margin-top: 8px;
        }

        .login-footer p {
            color: rgba(17, 42, 70, 0.5);
            font-size: 14px;
            font-family: "Inter", sans-serif;
        }

        .login-footer a {
            color: #112A46;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .login-footer a:hover {
            color: #2E5A88;
            text-decoration: underline;
        }

        /* ============================================================ */
        /* ERROR & SUCCESS MESSAGES                                    */
        /* ============================================================ */
        .error-message {
            display: none;
            background: rgba(17, 42, 70, 0.08);
            border: 1px solid rgba(17, 42, 70, 0.15);
            border-radius: 12px;
            padding: 12px 16px;
            color: #112A46;
            font-size: 14px;
            margin-bottom: 16px;
            font-family: "Inter", sans-serif;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        .success-message {
            display: none;
            background: rgba(0, 200, 81, 0.10);
            border: 1px solid rgba(0, 200, 81, 0.20);
            border-radius: 12px;
            padding: 12px 16px;
            color: #007E33;
            font-size: 14px;
            margin-bottom: 16px;
            font-family: "Inter", sans-serif;
        }

        .success-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        /* ============================================================ */
        /* RESPONSIVE                                                  */
        /* ============================================================ */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px 28px;
            }

            .login-card__header h1 {
                font-size: 26px;
            }

            .form-options {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .social-login {
                grid-template-columns: 1fr;
            }

            .cb-shell-header__inner {
                height: 64px;
                padding: 0 16px;
            }

            .cb-shell-brand {
                font-size: 20px;
            }

            .cb-shell-button {
                padding: 6px 16px;
                font-size: 12px;
            }
        }

        @media (max-width: 380px) {
            .login-card {
                padding: 24px 16px 20px;
            }

            .cb-shell-actions {
                gap: 6px;
            }

            .cb-shell-button {
                padding: 4px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- HEADER                                                       -->
    <!-- ============================================================ -->
    <header class="cb-shell-header" role="banner">
        <div class="cb-shell-header__inner">
            <a class="cb-shell-brand" href="/" aria-label="ClassyDate">
                Classy<span>Date</span>
            </a>

            <div class="cb-shell-actions">
                <a href="signup.html" class="cb-shell-button cb-shell-button--secondary">Join</a>
                <a href="login.html" class="cb-shell-button cb-shell-button--primary">Log in</a>
            </div>
        </div>
    </header>

    <!-- ============================================================ -->
    <!-- LOGIN FORM                                                   -->
    <!-- ============================================================ -->
    <main class="login-wrapper">
        <!-- Floating Hearts -->
        <div class="floating-hearts-login">
            <span class="heart-login" style="left:5%;animation-delay:0s;font-size:18px;">❤️</span>
            <span class="heart-login" style="left:15%;animation-delay:2s;font-size:24px;">💕</span>
            <span class="heart-login" style="left:25%;animation-delay:4s;font-size:14px;">❤️‍🔥</span>
            <span class="heart-login" style="left:35%;animation-delay:1s;font-size:28px;">💗</span>
            <span class="heart-login" style="left:45%;animation-delay:3s;font-size:18px;">❤️</span>
            <span class="heart-login" style="left:55%;animation-delay:5s;font-size:16px;">💖</span>
            <span class="heart-login" style="left:65%;animation-delay:1.5s;font-size:26px;">❤️‍🔥</span>
            <span class="heart-login" style="left:75%;animation-delay:3.5s;font-size:18px;">💕</span>
            <span class="heart-login" style="left:85%;animation-delay:4.5s;font-size:22px;">❤️</span>
            <span class="heart-login" style="left:95%;animation-delay:2.5s;font-size:16px;">💗</span>
        </div>

        <div class="login-card">
            <div class="login-card__header">
                <span class="icon">💎</span>
                <h1>Welcome Back</h1>
                <p>Log in to continue your journey to love</p>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="error-message">
                ⚠️ Invalid email or password. Please try again.
            </div>

            <!-- Success Message -->
            <div class="success-message" id="success-message">
                ✅ Login successful! Redirecting...
            </div>

            <form id="login-form" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" checked> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login" id="login-btn">Log In</button>
            </form>

            <div class="divider">or continue with</div>

            <div class="social-login">
                <button class="social-btn" onclick="handleSocialLogin('Google')">
                    <span class="icon">🔵</span> Google
                </button>
                <button class="social-btn" onclick="handleSocialLogin('Facebook')">
                    <span class="icon">🔷</span> Facebook
                </button>
            </div>

            <div class="login-footer">
                <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            </div>
        </div>
    </main>

    <!-- ============================================================ -->
    <!-- SCRIPTS - Firebase Auth                                      -->
    <!-- ============================================================ -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js"
            }
        }
    </script>

    <script type="module">
        // ============================================================
        // FIREBASE CONFIG - YOUR CONFIG HERE!
        // ============================================================
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyACEYbex1YBpqeH7c2bbFk-9AA7iYe_NXU",
            authDomain: "classydate-ff97f.firebaseapp.com",
            projectId: "classydate-ff97f",
            storageBucket: "classydate-ff97f.firebasestorage.app",
            messagingSenderId: "241438852209",
            appId: "1:241438852209:web:00e9af320aa28becd307d0",
            measurementId: "G-TET9ZFZD0P"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        console.log('🔥 Firebase Auth connected!');

        // ============================================================
        // EXPOSE FUNCTIONS TO GLOBAL WINDOW FOR INLINE onclick
        // ============================================================
        window.auth = auth;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.setPersistence = setPersistence;
        window.browserLocalPersistence = browserLocalPersistence;

        // ============================================================
        // HANDLE LOGIN
        // ============================================================
        window.handleLogin = async function(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            const loginBtn = document.getElementById('login-btn');

            // Hide previous messages
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            // Validation
            if (!email || !password) {
                errorMessage.textContent = '⚠️ Please fill in all fields.';
                errorMessage.classList.add('show');
                return false;
            }

            if (!email.includes('@') || !email.includes('.')) {
                errorMessage.textContent = '⚠️ Please enter a valid email address.';
                errorMessage.classList.add('show');
                return false;
            }

            if (password.length < 6) {
                errorMessage.textContent = '⚠️ Password must be at least 6 characters.';
                errorMessage.classList.add('show');
                return false;
            }

            // Show loading state
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Logging in...';
            loginBtn.style.opacity = '0.7';

            try {
                // Sign in with Firebase
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                console.log('✅ Login successful for:', user.email);

                // Save user info
                localStorage.setItem('classydate_user', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName || user.email.split('@')[0]
                }));

                // Show success
                successMessage.textContent = '✅ Login successful! Redirecting...';
                successMessage.classList.add('show');

                loginBtn.textContent = '✅ Logged In!';
                loginBtn.style.background = 'linear-gradient(135deg, #00C851, #007E33)';
                loginBtn.style.opacity = '1';

                // Redirect to members page
                setTimeout(() => {
                    window.location.href = 'members.html';
                }, 1500);

            } catch (error) {
                console.error('Login error:', error);

                let errorMsg = '⚠️ Login failed. ';
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMsg += 'No account found with this email.';
                        break;
                    case 'auth/wrong-password':
                        errorMsg += 'Incorrect password. Please try again.';
                        break;
                    case 'auth/too-many-requests':
                        errorMsg += 'Too many failed attempts. Please try again later.';
                        break;
                    case 'auth/invalid-email':
                        errorMsg += 'Please enter a valid email address.';
                        break;
                    default:
                        errorMsg += error.message;
                }

                errorMessage.textContent = errorMsg;
                errorMessage.classList.add('show');

                // Reset button
                loginBtn.disabled = false;
                loginBtn.textContent = 'Log In';
                loginBtn.style.opacity = '1';
                loginBtn.style.background = 'linear-gradient(135deg, #112A46, #2E5A88)';
            }

            return false;
        }

        // ============================================================
        // SOCIAL LOGIN HANDLER
        // ============================================================
        window.handleSocialLogin = function(provider) {
            alert('🔹 ' + provider + ' login coming soon!\n\nWe\'re working on adding social login features. Stay tuned!');
        }

        // ============================================================
        // CHECK AUTH STATE ON LOAD
        // ============================================================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log('✅ User already logged in:', user.email);
                // Auto redirect to members if already logged in
                // window.location.href = 'members.html';
            } else {
                console.log('👤 No user logged in');
            }
        });

        // ============================================================
        // REMOVE ERRORS ON INPUT
        // ============================================================
        document.getElementById('email').addEventListener('input', function() {
            document.getElementById('error-message').classList.remove('show');
            document.getElementById('success-message').classList.remove('show');
            const btn = document.getElementById('login-btn');
            btn.textContent = 'Log In';
            btn.style.background = 'linear-gradient(135deg, #112A46, #2E5A88)';
            btn.disabled = false;
            btn.style.opacity = '1';
        });

        document.getElementById('password').addEventListener('input', function() {
            document.getElementById('error-message').classList.remove('show');
            document.getElementById('success-message').classList.remove('show');
            const btn = document.getElementById('login-btn');
            btn.textContent = 'Log In';
            btn.style.background = 'linear-gradient(135deg, #112A46, #2E5A88)';
            btn.disabled = false;
            btn.style.opacity = '1';
        });

        console.log('💎 ClassyDate Login Page - Firebase Auth Ready!');
    </script>

</body>
</html>
