<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Members | ClassyDate</title>
    <meta name="description" content="Browse ClassyDate members and find meaningful connections.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #ACC8E5;
            color: #112A46;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; }

        /* ============================================================ */
        /* HEADER                                                       */
        /* ============================================================ */
        .cb-shell-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(172, 200, 229, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(17, 42, 70, 0.08);
        }

        .cb-shell-header__inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cb-shell-brand {
            display: flex;
            align-items: center;
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 24px;
            font-weight: 700;
            color: #112A46;
        }
        .cb-shell-brand span {
            font-family: "Inter", sans-serif;
            font-weight: 300;
            color: #2E5A88;
        }

        /* ============================================================ */
        /* HAMBURGER MENU                                               */
        /* ============================================================ */
        .menu-container {
            position: relative;
            display: inline-block;
        }

        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            font-size: 28px;
            color: #112A46;
            transition: all 0.3s ease;
            border-radius: 8px;
        }

        .menu-btn:hover {
            background: rgba(17, 42, 70, 0.08);
        }

        .menu-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 50px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            min-width: 180px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            z-index: 200;
        }

        .menu-dropdown.show {
            display: block;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-dropdown a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            color: #112A46;
            font-size: 14px;
            font-weight: 500;
            font-family: "Inter", sans-serif;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(17, 42, 70, 0.04);
        }

        .menu-dropdown a:last-child {
            border-bottom: none;
        }

        .menu-dropdown a:hover {
            background: rgba(17, 42, 70, 0.06);
        }

        .menu-dropdown .logout-btn {
            color: #dc3545;
            font-weight: 600;
        }

        .menu-dropdown .logout-btn:hover {
            background: rgba(220, 53, 69, 0.06);
        }

        /* ============================================================ */
        /* MEMBERS CONTAINER                                            */
        /* ============================================================ */
        .members-wrapper {
            flex: 1;
            padding: 100px 20px 60px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .members-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 30px;
        }

        .members-header h1 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 36px;
            color: #112A46;
            font-weight: 700;
        }

        .members-header .member-count {
            color: rgba(17, 42, 70, 0.5);
            font-size: 15px;
            font-family: "Inter", sans-serif;
        }

        .members-header .member-count strong {
            color: #112A46;
            font-weight: 700;
        }

        .view-toggle {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .view-toggle button {
            padding: 8px 16px;
            background: none;
            border: none;
            border-radius: 8px;
            color: rgba(17, 42, 70, 0.4);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
            font-weight: 600;
        }

        .view-toggle button.active {
            background: #112A46;
            color: #fff;
        }
        .view-toggle button:hover:not(.active) {
            color: rgba(17, 42, 70, 0.7);
        }

        /* ============================================================ */
        /* 2 COLUMN GRID                                                */
        /* ============================================================ */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        /* ============================================================ */
        /* MEMBER CARD                                                  */
        /* ============================================================ */
        .member-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.4s ease;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .member-card:hover {
            transform: translateY(-4px);
            border-color: rgba(17, 42, 70, 0.1);
            box-shadow: 0 8px 32px rgba(17, 42, 70, 0.08);
        }

        .member-card.long-press {
            background: rgba(17, 42, 70, 0.05);
            transform: scale(0.98);
        }

        /* ============================================================ */
        /* IMAGE WRAPPER                                               */
        /* ============================================================ */
        .member-card__image-wrapper {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1/1;
            background: #ACC8E5;
        }

        .member-card__image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .member-card:hover .member-card__image-wrapper img {
            transform: scale(1.03);
        }

        /* Carousel Slides */
        .carousel-slides {
            display: flex;
            transition: transform 0.8s ease;
            height: 100%;
            width: 100%;
        }

        .carousel-slide {
            min-width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
            flex-shrink: 0;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Carousel Buttons */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(17, 42, 70, 0.5);
            backdrop-filter: blur(4px);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 14px;
            cursor: pointer;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .member-card:hover .carousel-btn {
            opacity: 1;
        }

        .carousel-btn:hover {
            background: rgba(17, 42, 70, 0.9);
        }

        .carousel-btn.prev { left: 6px; }
        .carousel-btn.next { right: 6px; }

        /* ============================================================ */
        /* ✅ INSTAGRAM VERIFIED BADGE                                  */
        /* ============================================================ */
        .verified-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: #1DA1F2;
            border-radius: 50%;
            border: 2px solid #FFFFFF;
            box-shadow: 0 2px 8px rgba(29, 161, 242, 0.5);
            pointer-events: none;
        }

        .verified-badge svg {
            width: 14px;
            height: 14px;
            fill: #FFFFFF;
            display: block;
        }

        /* ============================================================ */
        /* ✅ ONLINE BUTTON - GREEN DOT IN CORNER                      */
        /* ============================================================ */
        .online-dot {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 5;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #28a745;
            border: 2.5px solid #FFFFFF;
            box-shadow: 0 0 12px rgba(40, 167, 69, 0.6);
            animation: pulse-online 1.8s infinite;
            pointer-events: none;
        }

        .online-dot.offline {
            background: #adb5bd;
            animation: none;
            box-shadow: none;
        }

        @keyframes pulse-online {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }

        /* ============================================================ */
        /* CARD INFO                                                    */
        /* ============================================================ */
        .member-card__info {
            padding: 14px 16px 16px;
        }

        .member-card__name-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .member-card__name-row h3 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 18px;
            font-weight: 700;
            color: #112A46;
        }

        /* Verified badge next to name */
        .verified-badge-name {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #1DA1F2;
            color: #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            font-weight: 700;
            border: 1.5px solid #fff;
            box-shadow: 0 1px 4px rgba(29, 161, 242, 0.3);
            flex-shrink: 0;
        }

        .member-card__location {
            color: rgba(17, 42, 70, 0.4);
            font-size: 13px;
            margin-top: 2px;
            font-family: "Inter", sans-serif;
        }

        .member-card__origin {
            color: rgba(17, 42, 70, 0.4);
            font-size: 13px;
            margin-top: 1px;
            font-family: "Inter", sans-serif;
        }

        /* ============================================================ */
        /* BUTTONS                                                      */
        /* ============================================================ */
        .member-card__actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(17, 42, 70, 0.06);
        }

        .member-card__actions button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
        }

        .btn-view {
            background: rgba(17, 42, 70, 0.08);
            color: #112A46;
        }
        .btn-view:hover {
            background: rgba(17, 42, 70, 0.18);
            transform: translateY(-2px);
        }

        .btn-message {
            background: linear-gradient(135deg, #112A46, #2E5A88);
            color: #fff;
        }
        .btn-message:hover {
            background: linear-gradient(135deg, #2E5A88, #112A46);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(17, 42, 70, 0.25);
        }

        /* ============================================================ */
        /* EMPTY STATE                                                  */
        /* ============================================================ */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(17, 42, 70, 0.3);
            grid-column: 1 / -1;
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 24px;
            color: #112A46;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-family: "Inter", sans-serif;
        }

        /* ============================================================ */
        /* PAGINATION                                                   */
        /* ============================================================ */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
        }

        .pagination button {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: rgba(17, 42, 70, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            font-size: 13px;
        }

        .pagination button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .pagination button.active {
            background: #112A46;
            color: #fff;
            border-color: #112A46;
        }
        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ============================================================ */
        /* SHARE TOAST                                                  */
        /* ============================================================ */
        .share-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(17, 42, 70, 0.95);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 14px 28px;
            border-radius: 14px;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: all 0.4s ease;
            text-align: center;
            max-width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .share-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .share-toast .close-share {
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            padding: 0 0 0 12px;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .share-toast .close-share:hover {
            opacity: 1;
        }

        .share-toast .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: #25D366;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            font-family: "Inter", sans-serif;
            transition: all 0.3s ease;
        }

        .share-toast .share-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(37, 211, 102, 0.3);
        }

        /* ============================================================ */
        /* PROFILE MODAL                                                */
        /* ============================================================ */
        .profile-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 0px;
            animation: fadeInModal 0.3s ease;
        }

        .profile-modal.active {
            display: flex;
        }

        @keyframes fadeInModal {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .profile-modal-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 0px;
            max-width: 100%;
            width: 100%;
            padding: 24px 20px 20px;
            border: none;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
            max-height: 100vh;
            height: 100vh;
            overflow-y: auto;
            position: relative;
        }

        .profile-modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: rgba(0, 0, 0, 0.05);
            border: none;
            font-size: 24px;
            color: #112A46;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .profile-modal-close:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: rotate(90deg);
        }

        .profile-modal-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #112A46;
            margin: 0 auto 8px;
            display: block;
        }

        .profile-modal-name {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 22px;
            color: #112A46;
            text-align: center;
            font-weight: 700;
        }

        .profile-modal-name .verified-badge {
            position: relative;
            top: auto;
            right: auto;
            display: inline-block;
            width: 20px;
            height: 20px;
            font-size: 11px;
            margin-left: 4px;
        }

        .profile-modal-status {
            text-align: center;
            font-size: 14px;
            color: rgba(17, 42, 70, 0.5);
            margin-top: 2px;
            font-family: "Inter", sans-serif;
        }

        .profile-modal-details {
            margin-top: 14px;
            display: grid;
            gap: 6px;
            background: rgba(17, 42, 70, 0.03);
            padding: 10px 14px;
            border-radius: 12px;
        }

        .profile-modal-details .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(17, 42, 70, 0.04);
            font-family: "Inter", sans-serif;
            font-size: 14px;
        }

        .profile-modal-details .detail-item:last-child {
            border-bottom: none;
        }

        .profile-modal-details .detail-item .label {
            color: rgba(17, 42, 70, 0.4);
            font-weight: 500;
        }

        .profile-modal-details .detail-item .value {
            color: #112A46;
            font-weight: 600;
        }

        .profile-modal-bio {
            margin-top: 10px;
            padding: 10px 14px;
            background: rgba(17, 42, 70, 0.04);
            border-radius: 10px;
            font-family: "Inter", sans-serif;
            font-size: 14px;
            color: rgba(17, 42, 70, 0.7);
            line-height: 1.6;
        }

        .profile-modal-interests {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
            margin-bottom: 12px;
        }

        .profile-modal-interests .tag {
            padding: 4px 14px;
            background: rgba(17, 42, 70, 0.06);
            border-radius: 50px;
            font-size: 12px;
            color: #112A46;
            font-family: "Inter", sans-serif;
            font-weight: 500;
        }

        .modal-photos-container {
            margin: 10px 0 8px;
            border-radius: 12px;
            overflow: hidden;
            background: #e8ecf0;
            position: relative;
            max-height: 350px;
        }

        .modal-carousel-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        .modal-carousel-slides {
            display: flex;
            transition: transform 0.5s ease;
            touch-action: pan-y;
        }

        .modal-carousel-slide {
            min-width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: #e8ecf0;
        }

        .modal-carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 16px;
            cursor: pointer;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-carousel-btn:hover {
            background: rgba(0, 0, 0, 0.7);
        }

        .modal-carousel-btn.prev { left: 8px; }
        .modal-carousel-btn.next { right: 8px; }

        .modal-carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 6px 0 2px;
            background: transparent;
        }

        .modal-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(17, 42, 70, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .modal-dot.active {
            background: #112A46;
            width: 24px;
            border-radius: 4px;
        }

        .profile-modal .btn-message-profile {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(135deg, #112A46, #2E5A88);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
        }

        .profile-modal .btn-message-profile:hover {
            background: linear-gradient(135deg, #2E5A88, #112A46);
            transform: translateY(-2px);
        }

        /* ============================================================ */
        /* TOAST                                                       */
        /* ============================================================ */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 24px;
            background: #112A46;
            color: #fff;
            border-radius: 12px;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            font-size: 14px;
            z-index: 999;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success {
            background: #28a745;
        }
        .toast.error {
            background: #dc3545;
        }

        /* ============================================================ */
        /* RESPONSIVE                                                   */
        /* ============================================================ */
        @media (max-width: 768px) {
            .members-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .members-header h1 {
                font-size: 28px;
            }

<body>

    <header class="cb-shell-header" role="banner">

                    <a href="#" onclick="logoutUser()" class="logout-btn">🚪 Log out</a>
                </div>
            </div>
        </div>
    </header>

    <!-- ============================================================ -->
    <!-- MAIN CONTENT                                                  -->
    <!-- ============================================================ -->
    <main class="members-wrapper">
        <div class="members-header">
            <div>
                <h1>Browse <span>Members</span></h1>
                <span class="member-count">Showing <strong id="total-count">0</strong> members</span>

            <div class="view-toggle">
                <button class="active" onclick="setView('grid')" id="grid-view">▦ Grid</button>

    <!-- ============================================================ -->

    <div class="share-toast" id="share-toast">

        </div>
        <button class="share-btn" id="share-whatsapp-btn">
            <span class="icon">💬</span> Share on WhatsApp
        </button>

    <!-- Profile Modal -->
    <div class="profile-modal" id="profile-modal">
        <div class="profile-modal-content">
            <button class="profile-modal-close" onclick="closeProfileModal()">✕</button>
            
            <img class="profile-modal-avatar" id="modal-avatar" src="" alt="Profile">
            <h2 class="profile-modal-name" id="modal-name">Name</h2>
            <div class="profile-modal-status" id="modal-status-text">📍 Location</div>

            <div class="profile-modal-details" id="modal-details">
                <div class="detail-item">
                    <span class="label">Age</span>
                    <span class="value" id="modal-age">—</span>
                </div>
                <div class="detail-item">
                    <span class="label">Gender</span>
                    <span class="value" id="modal-gender">—</span>
                </div>
                <div class="detail-item">
                    <span class="label">Location</span>
                    <span class="value" id="modal-location">—</span>
                </div>
                <div class="detail-item">
                    <span class="label">Origin</span>
                    <span class="value" id="modal-origin">—</span>
                </div>
                <div class="detail-item">
                    <span class="label">Status</span>
                    <span class="value" id="modal-status">—</span>
                </div>
                <div class="detail-item">
                    <span class="label">Verified</span>
                    <span class="value" id="modal-verified">—</span>
                </div>
            </div>

            <div class="profile-modal-bio" id="modal-bio">No bio available.</div>
            <div class="profile-modal-interests" id="modal-interests"></div>

            <div class="modal-photos-container" id="modal-photos-container">
                <div class="modal-carousel-wrapper" id="modal-carousel-wrapper">
                    <div class="modal-carousel-slides" id="modal-carousel-slides"></div>
                    <button class="modal-carousel-btn prev" onclick="event.stopPropagation(); changeModalPhoto(-1)">‹</button>
                    <button class="modal-carousel-btn next" onclick="event.stopPropagation(); changeModalPhoto(1)">›</button>
                </div>
                <div class="modal-carousel-dots" id="modal-carousel-dots"></div>
            </div>

            <button class="btn-message-profile" id="modal-message-btn" onclick="modalSendMessage()">💬 Send Message</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- ============================================================ -->
    <!-- SCRIPTS                                                      -->
    <!-- ============================================================ -->
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
            }
        }
    </script>

    <script type="module">
        import { createClient } from "@supabase/supabase-js";

        const SUPABASE_URL = 'https://ehfnzsfnsoiyiwpxqmli.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ybgZxnGuU_Gt35rfqkEdBw_YkEdD8vl';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        console.log('🔥 Supabase connected!');

        let allMembers = [];
        let filteredMembers = [];
        let currentPage = 1;
        const perPage = 6;
        let currentView = 'grid';
        let isLoading = true;
        let selectedMemberId = null;
        let longPressMember = null;

        const photoIndexMap = {};
        const carouselIntervals = {};

        const grid = document.getElementById('members-grid');
        const paginationContainer = document.getElementById('pagination');
        const totalCount = document.getElementById('total-count');

        function getPhotoUrl(fileId) {
            if (!fileId) return null;
            try {
                const { data } = supabase.storage.from('member_photos').getPublicUrl(fileId);
                return data?.publicUrl || null;
            } catch (error) {
                console.warn('Error getting photo URL for:', fileId, error);
                return null;
            }
        }

        // ============================================================
        // MENU FUNCTIONS
        // ============================================================
        window.toggleMenu = function() {
            const dropdown = document.getElementById('menuDropdown');
            dropdown.classList.toggle('show');
        }

        document.addEventListener('click', function(e) {
            const container = document.querySelector('.menu-container');
            if (container && !container.contains(e.target)) {
                document.getElementById('menuDropdown').classList.remove('show');
            }
        });

        window.logoutUser = function() {
            localStorage.removeItem('classy_user');
            localStorage.removeItem('classydate_user');
            localStorage.removeItem('classy_user_email');
            localStorage.removeItem('classy_user_name');
            localStorage.removeItem('classy_user_id');
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'login.html';
        }

        // ============================================================
        // 🔥 FIXED: LOAD MEMBERS - SHOW ALL MEMBERS (NO FILTER)
        // ============================================================
        async function loadMembers() {
            try {
                // 🔥 REMOVED the .eq('verified', true) filter - shows ALL members
                const { data, error } = await supabase
                    .from('members')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allMembers = data || [];
                isLoading = false;
                console.log('📊 All members loaded from Supabase:', allMembers.length);
                
                totalCount.textContent = allMembers.length;
                filteredMembers = [...allMembers];
                renderMembers(filteredMembers);
                updatePagination(filteredMembers.length);
                
            } catch (error) {
                console.error('Error loading members:', error);
                showToast('Error loading members: ' + error.message, 'error');
                isLoading = false;
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">⚠️</div>
                        <h3>Could not load members</h3>
                        <p>Please check your connection.</p>
                    </div>
                `;
            }
        }

        // ============================================================
        // CHANGE PHOTO
        // ============================================================
        window.changePhoto = function(memberId, direction) {
            const wrapper = document.querySelector(`.member-card__image-wrapper[data-member="${memberId}"]`);
            if (!wrapper) return;

            const slides = wrapper.querySelector('.carousel-slides');
            if (!slides) return;
            const totalSlides = slides.children.length;
            if (totalSlides <= 1) return;

            if (!photoIndexMap[memberId]) photoIndexMap[memberId] = 0;
            let current = photoIndexMap[memberId];

            let newIndex = current + direction;
            if (newIndex < 0) newIndex = totalSlides - 1;
            if (newIndex >= totalSlides) newIndex = 0;

            slides.style.transform = `translateX(-${newIndex * 100}%)`;
            photoIndexMap[memberId] = newIndex;
        }

        // ============================================================
        // START CAROUSEL - EACH CARD HAS DIFFERENT TIMING
        // ============================================================
        function startCarousel(memberId) {
            if (carouselIntervals[memberId]) clearInterval(carouselIntervals[memberId]);
            
            const wrapper = document.querySelector(`.member-card__image-wrapper[data-member="${memberId}"]`);
            if (!wrapper) return;
            
            const slides = wrapper.querySelector('.carousel-slides');
            if (!slides || slides.children.length <= 1) return;

            // Each card gets different timing
            const randomDelay = 3500 + Math.random() * 2000;
            
            carouselIntervals[memberId] = setInterval(() => {
                window.changePhoto(memberId, 1);
            }, randomDelay);
        }

        function stopCarousel(memberId) {
            if (carouselIntervals[memberId]) {
                clearInterval(carouselIntervals[memberId]);
                delete carouselIntervals[memberId];
            }
        }

        // ============================================================
        // RENDER MEMBERS
        // ============================================================
        function renderMembers(members) {
            console.log('🎨 Rendering members:', members.length);
            
            if (isLoading) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:60px;color:rgba(17,42,70,0.3);">
                        <span style="display:inline-block;width:32px;height:32px;border:3px solid rgba(17,42,70,0.1);border-top-color:#112A46;border-radius:50%;animation:spin 0.8s linear infinite;"></span>
                        <br><br>Loading members...
                    </div>
                `;
                return;
            }

            if (members.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">💎</div>
                        <h3>No members yet</h3>
                        <p>Check back soon for amazing people!</p>
                    </div>
                `;
                return;
            }

            totalCount.textContent = members.length;

            grid.innerHTML = members.map(member => {
                let photos = [];
                if (member.photo_file_ids && member.photo_file_ids.length > 0) {
                    photos = member.photo_file_ids
                        .map(id => getPhotoUrl(id))
                        .filter(url => url !== null && url !== '');
                }

                const memberName = member.name || 'User';
                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=112A46&color=fff&size=400`;
                
                if (photos.length === 0) {
                    photos = [avatarUrl];
                }

                let slidesHTML = '';
                photos.forEach((photo, index) => {
                    slidesHTML += `
                        <div class="carousel-slide">
                            <img src="${photo}" alt="${memberName}" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=112A46&color=fff&size=400'">
                        </div>
                    `;
                });

                // Instagram Verified Badge
                const verifiedBadge = member.verified ? `
                    <div class="verified-badge">
                        <svg viewBox="0 0 24 24" fill="white">
                            <path d="M12 1L9.5 5L5 6L7 10L5 14L9.5 15L12 19L14.5 15L19 14L17 10L19 6L14.5 5L12 1Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
                            <path d="M9 12L11 14L15 10" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                ` : '';

                // Online button
                const onlineDot = member.online ? 
                    `<span class="online-dot"></span>` : 
                    `<span class="online-dot offline"></span>`;

                // Verified badge next to name
                const verifiedBadgeName = member.verified ? 
                    `<span class="verified-badge-name">✓</span>` : '';

                return `
                    <div class="member-card" data-id="${member.id}" data-name="${memberName}" data-location="${member.location || ''}" data-origin="${member.origin || ''}" data-age="${member.age || ''}" data-verified="${member.verified}">
                        <div class="member-card__image-wrapper" data-member="${member.id}">
                            <div class="carousel-slides" style="display:flex;transition:transform 0.8s ease;">
                                ${slidesHTML}
                            </div>
                            ${verifiedBadge}
                            ${onlineDot}
                            ${photos.length > 1 ? `
                                <button class="carousel-btn prev" onclick="event.stopPropagation(); window.changePhoto('${member.id}', -1)">‹</button>
                                <button class="carousel-btn next" onclick="event.stopPropagation(); window.changePhoto('${member.id}', 1)">›</button>
                            ` : ''}
                        </div>
                        <div class="member-card__info">
                            <div class="member-card__name-row">
                                <h3>${memberName}</h3>
                                ${verifiedBadgeName}
                            </div>
                            <div class="member-card__location">📍 ${member.location || 'Location Unknown'}</div>
                            <div class="member-card__origin">🌍 Origin: ${member.origin || 'Not specified'}</div>
                            <div class="member-card__actions">
                                <button class="btn-view" onclick="event.stopPropagation(); window.openProfileModal('${member.id}')">👤 View Profile</button>
                                <button class="btn-message" onclick="event.stopPropagation(); window.sendMessage('${member.id}')">💬 Message</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Start carousels with different timing
            members.forEach(member => {
                startCarousel(member.id);
            });

            // Add long press event listeners
            document.querySelectorAll('.member-card').forEach(card => {
                setupLongPress(card);
            });

            updatePagination(members.length);
        }

        // ============================================================
        // LONG PRESS TO SHARE
        // ============================================================
        let longPressTimer = null;
        let isLongPress = false;

        function setupLongPress(card) {
            card.addEventListener('touchstart', function(e) {
                isLongPress = false;
                longPressTimer = setTimeout(() => {
                    isLongPress = true;
                    handleLongPress(this, e);
                }, 600);
            });

            card.addEventListener('touchmove', function(e) {
                clearTimeout(longPressTimer);
            });

            card.addEventListener('touchend', function(e) {
                clearTimeout(longPressTimer);
                if (isLongPress) {
                    e.preventDefault();
                }
            });

            card.addEventListener('mousedown', function(e) {
                isLongPress = false;
                longPressTimer = setTimeout(() => {
                    isLongPress = true;
                    handleLongPress(this, e);
                }, 800);
            });

            card.addEventListener('mouseup', function(e) {
                clearTimeout(longPressTimer);
            });

            card.addEventListener('mouseleave', function(e) {
                clearTimeout(longPressTimer);
            });
        }

        function handleLongPress(card, event) {
            event.preventDefault();
            
            const id = card.dataset.id;
            const name = card.dataset.name || 'Member';
            const location = card.dataset.location || 'Unknown';
            const origin = card.dataset.origin || 'Not specified';
            const age = card.dataset.age || '?';
            const verified = card.dataset.verified === 'true';

            const member = allMembers.find(m => m.id === id);
            if (!member) return;

            longPressMember = member;

            const shareToast = document.getElementById('share-toast');
            shareToast.classList.add('show');

            const shareBtn = document.getElementById('share-whatsapp-btn');
            shareBtn.onclick = function() {
                shareOnWhatsApp(member);
            };

            card.classList.add('long-press');
            setTimeout(() => {
                card.classList.remove('long-press');
            }, 300);
        }

        window.closeShareToast = function() {
            document.getElementById('share-toast').classList.remove('show');
            longPressMember = null;
        }

        // ============================================================
        // SHARE ON WHATSAPP
        // ============================================================
        function shareOnWhatsApp(member) {
            const name = member.name || 'Member';
            const location = member.location || 'Unknown';
            const origin = member.origin || 'Not specified';
            const age = member.age || '?';
            const verified = member.verified ? '✅ Verified Member' : '';

            const message = `
👤 *${name}* ${verified ? '✔️' : ''}
📍 Location: ${location}
🌍 Origin: ${origin}
🎂 Age: ${age}
💎 ClassyDate Member

---
Check out this member on ClassyDate!
https://classydate.com/profile/${member.id}
            `.trim();

            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/?text=${encodedMessage}`;

            document.getElementById('share-toast').classList.remove('show');
            window.open(whatsappUrl, '_blank');
            showToast('📤 Opening WhatsApp...', 'success');
        }

        // ============================================================
        // VIEW FUNCTIONS
        // ============================================================
        window.setView = function(view) {
            currentView = view;
            grid.className = 'members-grid' + (view === 'list' ? ' list-view' : '');
            document.getElementById('grid-view').classList.toggle('active', view === 'grid');
            document.getElementById('list-view').classList.toggle('active', view === 'list');
            renderMembers(filteredMembers);
        }

        function updatePagination(total) {
            const pages = Math.ceil(total / perPage);
            if (pages <= 1) {
                paginationContainer.innerHTML = '';
                return;
            }

            let html = `<button onclick="window.goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹ Prev</button>`;
            for (let i = 1; i <= Math.min(pages, 5); i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="window.goToPage(${i})">${i}</button>`;
            }
            if (pages > 5) {
                html += `<span style="color:rgba(17,42,70,0.15);padding:8px;">…</span>`;
                html += `<button onclick="window.goToPage(${pages})">${pages}</button>`;
            }
            html += `<button onclick="window.goToPage(${currentPage + 1})" ${currentPage === pages ? 'disabled' : ''}>Next ›</button>`;

            paginationContainer.innerHTML = html;
        }

        window.goToPage = function(page) {
            const total = filteredMembers.length;
            const pages = Math.ceil(total / perPage);
            if (page < 1 || page > pages) return;
            currentPage = page;
            renderMembers(filteredMembers);
        }

        // ============================================================
        // PROFILE MODAL FUNCTIONS
        // ============================================================
        window.openProfileModal = function(id) {
            const member = allMembers.find(m => m.id === id);
            if (!member) {
                showToast('❌ Member not found', 'error');
                return;
            }

            selectedMemberId = id;

            let photos = [];
            if (member.photo_file_ids && member.photo_file_ids.length > 0) {
                photos = member.photo_file_ids
                    .map(id => getPhotoUrl(id))
                    .filter(url => url !== null && url !== '');
            }

            const memberName = member.name || 'User';
            let mainPhoto = `https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=112A46&color=fff&size=400`;
            if (photos.length > 0) {
                mainPhoto = photos[0];
            }

            document.getElementById('modal-avatar').src = mainPhoto;
            document.getElementById('modal-avatar').onerror = function() {
                this.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=112A46&color=fff&size=200`;
            };

            let nameHTML = memberName;
            if (member.verified) nameHTML += ' <span class="verified-badge" style="position:relative;top:auto;right:auto;display:inline-block;width:20px;height:20px;font-size:11px;margin-left:4px;">✓</span>';
            document.getElementById('modal-name').innerHTML = nameHTML;

            document.getElementById('modal-status-text').textContent = `📍 ${member.location || 'Location Unknown'}`;

            document.getElementById('modal-age').textContent = member.age || '—';
            document.getElementById('modal-gender').textContent = member.gender || '—';
            document.getElementById('modal-location').textContent = member.location || '—';
            document.getElementById('modal-origin').textContent = member.origin || '—';
            document.getElementById('modal-status').innerHTML = member.online ? '🟢 Online' : '⚪ Offline';
            document.getElementById('modal-verified').textContent = member.verified ? '✅ Yes' : '❌ No';

            document.getElementById('modal-bio').textContent = member.about_me || member.bio || 'No bio available.';

            const interestsContainer = document.getElementById('modal-interests');
            if (member.interests && member.interests.length > 0) {
                interestsContainer.innerHTML = member.interests.map(i => `<span class="tag">#${i}</span>`).join('');
            } else {
                interestsContainer.innerHTML = '<span style="color:rgba(17,42,70,0.3);font-size:14px;">No interests listed</span>';
            }

            const slidesContainer = document.getElementById('modal-carousel-slides');
            const dotsContainer = document.getElementById('modal-carousel-dots');
            
            modalPhotoIndex = 0;

            if (photos.length > 0) {
                let slidesHTML = '';
                photos.forEach((photo, index) => {
                    slidesHTML += `
                        <div class="modal-carousel-slide">
                            <img src="${photo}" alt="Photo ${index + 1}" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=112A46&color=fff&size=400'">
                        </div>
                    `;
                });
                slidesContainer.innerHTML = slidesHTML;
                slidesContainer.style.transform = 'translateX(0%)';

                let dotsHTML = '';
                photos.forEach((_, index) => {
                    dotsHTML += `<span class="modal-dot ${index === 0 ? 'active' : ''}"></span>`;
                });
                dotsContainer.innerHTML = dotsHTML;

                const prevBtn = document.querySelector('.modal-carousel-btn.prev');
                const nextBtn = document.querySelector('.modal-carousel-btn.next');
                if (photos.length <= 1) {
                    prevBtn.style.display = 'none';
                    nextBtn.style.display = 'none';
                } else {
                    prevBtn.style.display = 'flex';
                    nextBtn.style.display = 'flex';
                }

                document.getElementById('modal-photos-container').style.display = 'block';
            } else {
                slidesContainer.innerHTML = `
                    <div class="modal-carousel-slide" style="display:flex;align-items:center;justify-content:center;background:#e8ecf0;color:rgba(17,42,70,0.3);font-family:'Inter',sans-serif;font-size:16px;">
                        No photos available
                    </div>
                `;
                dotsContainer.innerHTML = '';
                document.getElementById('modal-photos-container').style.display = 'block';
            }

            document.getElementById('modal-message-btn').onclick = function() {
                window.sendMessage(id);
            };

            document.getElementById('profile-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        window.changeModalPhoto = function(direction) {
            const slides = document.getElementById('modal-carousel-slides');
            const dots = document.querySelectorAll('.modal-dot');
            
            if (!slides) return;
            
            const totalSlides = slides.children.length;
            if (totalSlides <= 1) return;
            
            let newIndex = modalPhotoIndex + direction;
            if (newIndex < 0) newIndex = totalSlides - 1;
            if (newIndex >= totalSlides) newIndex = 0;
            
            slides.style.transform = `translateX(-${newIndex * 100}%)`;
            modalPhotoIndex = newIndex;
            
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === newIndex);
            });
        }

        let touchStartX = 0;

        document.addEventListener('DOMContentLoaded', function() {
            const modalContent = document.querySelector('.profile-modal-content');
            
            if (modalContent) {
                modalContent.addEventListener('touchstart', function(e) {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });

                modalContent.addEventListener('touchend', function(e) {
                    const touchEndX = e.changedTouches[0].screenX;
                    const diff = touchStartX - touchEndX;
                    
                    if (Math.abs(diff) > 50) {
                        if (diff > 0) {
                            window.changeModalPhoto(1);
                        } else {
                            window.changeModalPhoto(-1);
                        }
                    }
                }, { passive: true });
            }
        });

        window.closeProfileModal = function() {
            document.getElementById('profile-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('profile-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeProfileModal();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeProfileModal();
            }
        });

        window.modalSendMessage = function() {
            if (selectedMemberId) {
                window.sendMessage(selectedMemberId);
            }
        }

        window.sendMessage = function(id) {
            const member = allMembers.find(m => m.id === id);
            if (!member) {
                showToast('❌ Member not found', 'error');
                return;
            }

            closeProfileModal();

            const user = localStorage.getItem('classy_user');
            if (!user) {
                showToast('🔒 Please log in to send messages', 'error');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                return;
            }

            localStorage.setItem('classydate_selected_member', JSON.stringify(member));
            window.location.href = `chat.html?user=${id}&name=${encodeURIComponent(member.name)}`;
        }

        // ============================================================
        // TOAST
        // ============================================================
        let toastTimeout;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        // INIT
        // ============================================================
        loadMembers();

        console.log('💎 ClassyDate Members Page - FINAL FIXED VERSION!');
        console.log('✅ All members loaded - No filter applied');
        console.log('✅ Instagram verified badge with SVG');
        console.log('✅ Online button in corner');
        console.log('✅ Each card slides independently with different timing');
        console.log('✅ Long press to share via WhatsApp');
    </script>
