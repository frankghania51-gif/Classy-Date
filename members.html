<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Members | ClassyDate</title>
    <meta name="description" content="Browse ClassyDate members and find meaningful connections.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           CLASSYDATE - MEMBERS PAGE - FIXED VERSION
           ============================================================ */

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #ACC8E5;
            color: #112A46;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; }

        /* ============================================================ */
        /* HEADER                                                       */
        /* ============================================================ */
        .cb-shell-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(172, 200, 229, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(17, 42, 70, 0.08);
        }

        .cb-shell-header__inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cb-shell-brand {
            display: flex;
            align-items: center;
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 24px;
            font-weight: 700;
            color: #112A46;
        }
        .cb-shell-brand span {
            font-family: "Inter", sans-serif;
            font-weight: 300;
            color: #2E5A88;
        }

        /* ============================================================ */
        /* ✅ 3-LINE HAMBURGER MENU                                     */
        /* ============================================================ */
        .menu-container {
            position: relative;
            display: inline-block;
        }

        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            font-size: 28px;
            color: #112A46;
            transition: all 0.3s ease;
            border-radius: 8px;
        }

        .menu-btn:hover {
            background: rgba(17, 42, 70, 0.08);
        }

        .menu-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 50px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            min-width: 180px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            z-index: 200;
        }

        .menu-dropdown.show {
            display: block;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-dropdown a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            color: #112A46;
            font-size: 14px;
            font-weight: 500;
            font-family: "Inter", sans-serif;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(17, 42, 70, 0.04);
        }

        .menu-dropdown a:last-child {
            border-bottom: none;
        }

        .menu-dropdown a:hover {
            background: rgba(17, 42, 70, 0.06);
        }

        .menu-dropdown .menu-divider {
            height: 1px;
            background: rgba(17, 42, 70, 0.06);
            margin: 4px 0;
        }

        .menu-dropdown .logout-btn {
            color: #dc3545;
            font-weight: 600;
        }

        .menu-dropdown .logout-btn:hover {
            background: rgba(220, 53, 69, 0.06);
        }

        /* ============================================================ */
        /* MEMBERS CONTAINER                                            */
        /* ============================================================ */
        .members-wrapper {
            flex: 1;
            padding: 100px 20px 60px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .members-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 30px;
        }

        .members-header h1 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 36px;
            color: #112A46;
            font-weight: 700;
        }

        .members-header h1 span { color: #112A46; }

        .members-header .member-count {
            color: rgba(17, 42, 70, 0.5);
            font-size: 15px;
            font-family: "Inter", sans-serif;
        }

        .members-header .member-count strong {
            color: #112A46;
            font-weight: 700;
        }

        .view-toggle {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .view-toggle button {
            padding: 8px 16px;
            background: none;
            border: none;
            border-radius: 8px;
            color: rgba(17, 42, 70, 0.4);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
            font-weight: 600;
        }

        .view-toggle button.active {
            background: #112A46;
            color: #fff;
        }
        .view-toggle button:hover:not(.active) {
            color: rgba(17, 42, 70, 0.7);
        }

        /* ============================================================ */
        /* 2 COLUMN GRID                                                */
        /* ============================================================ */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        /* ============================================================ */
        /* MEMBER CARD                                                  */
        /* ============================================================ */
        .member-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.4s ease;
        }

        .member-card:hover {
            transform: translateY(-4px);
            border-color: rgba(17, 42, 70, 0.1);
            box-shadow: 0 8px 32px rgba(17, 42, 70, 0.08);
        }

        /* ============================================================ */
        /* IMAGE CAROUSEL                                               */
        /* ============================================================ */
        .member-card__image-wrapper {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1/1;
            background: #ACC8E5;
        }

        .member-card__image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .member-card:hover .member-card__image-wrapper img {
            transform: scale(1.03);
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(17, 42, 70, 0.5);
            backdrop-filter: blur(4px);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 14px;
            cursor: pointer;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .member-card:hover .carousel-btn {
            opacity: 1;
        }

        .carousel-btn:hover {
            background: rgba(17, 42, 70, 0.9);
        }

        .carousel-btn.prev { left: 6px; }
        .carousel-btn.next { right: 6px; }

        /* ============================================================ */
        /* ✅ INSTAGRAM-STYLE VERIFIED BADGE                           */
        /* ============================================================ */
        .verified-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 2;
            background: #1DA1F2;
            color: #fff;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(29, 161, 242, 0.3);
            border: 2px solid #fff;
        }

        /* ============================================================ */
        /* DOT INDICATORS                                               */
        /* ============================================================ */
        .image-dots {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            z-index: 2;
            background: rgba(17, 42, 70, 0.3);
            backdrop-filter: blur(4px);
            padding: 4px 8px;
            border-radius: 50px;
        }

        .image-dots .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }

        .image-dots .dot.active {
            background: #fff;
            width: 16px;
            border-radius: 4px;
        }

        /* ============================================================ */
        /* STATUS - ONLY SHOW ONLINE                                   */
        /* ============================================================ */
        .member-card__status {
            position: absolute;
            bottom: 8px;
            right: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(17, 42, 70, 0.4);
            backdrop-filter: blur(4px);
            padding: 2px 10px 2px 6px;
            border-radius: 50px;
            font-size: 10px;
            font-family: "Inter", sans-serif;
            color: #fff;
            z-index: 2;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot--online {
            background: #28a745;
            animation: pulse-dot 1.5s infinite;
        }

        .status-dot--offline {
            display: none;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ============================================================ */
        /* CARD INFO                                                    */
        /* ============================================================ */
        .member-card__info {
            padding: 14px 16px 16px;
        }

        .member-card__name {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .member-card__name h3 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 18px;
            font-weight: 700;
            color: #112A46;
        }

        .member-card__name .age {
            color: rgba(17, 42, 70, 0.4);
            font-weight: 400;
            font-size: 14px;
            font-family: "Inter", sans-serif;
        }

        .member-card__location {
            color: rgba(17, 42, 70, 0.4);
            font-size: 13px;
            margin-top: 2px;
            font-family: "Inter", sans-serif;
        }

        .member-card__bio {
            color: rgba(17, 42, 70, 0.6);
            font-size: 13px;
            margin-top: 6px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-family: "Inter", sans-serif;
        }

        .member-card__interests {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }

        .interest-tag {
            padding: 2px 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            font-size: 10px;
            color: rgba(17, 42, 70, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-family: "Inter", sans-serif;
        }

        /* ============================================================ */
        /* ✅ BIGGER BUTTONS                                            */
        /* ============================================================ */
        .member-card__actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(17, 42, 70, 0.06);
        }

        .member-card__actions button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
        }

        .btn-view {
            background: rgba(17, 42, 70, 0.08);
            color: #112A46;
        }
        .btn-view:hover {
            background: rgba(17, 42, 70, 0.18);
            transform: translateY(-2px);
        }

        .btn-message {
            background: linear-gradient(135deg, #112A46, #2E5A88);
            color: #fff;
        }
        .btn-message:hover {
            background: linear-gradient(135deg, #2E5A88, #112A46);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(17, 42, 70, 0.25);
        }

        /* ============================================================ */
        /* EMPTY STATE                                                  */
        /* ============================================================ */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(17, 42, 70, 0.3);
            grid-column: 1 / -1;
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 24px;
            color: #112A46;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-family: "Inter", sans-serif;
        }

        /* ============================================================ */
        /* PAGINATION                                                   */
        /* ============================================================ */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
        }

        .pagination button {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: rgba(17, 42, 70, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            font-size: 13px;
        }

        .pagination button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .pagination button.active {
            background: #112A46;
            color: #fff;
            border-color: #112A46;
        }
        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ============================================================ */
        /* PROFILE MODAL                                                */
        /* ============================================================ */
        .profile-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 0px;
            animation: fadeInModal 0.3s ease;
        }

        .profile-modal.active {
            display: flex;
        }

        @keyframes fadeInModal {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .profile-modal-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 0px;
            max-width: 100%;
            width: 100%;
            padding: 24px 20px 20px;
            border: none;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
            max-height: 100vh;
            height: 100vh;
            overflow-y: auto;
            position: relative;
        }

        .profile-modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: rgba(0, 0, 0, 0.05);
            border: none;
            font-size: 24px;
            color: #112A46;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .profile-modal-close:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: rotate(90deg);
        }

        .profile-modal-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #112A46;
            margin: 0 auto 8px;
            display: block;
        }

        .profile-modal-name {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 22px;
            color: #112A46;
            text-align: center;
            font-weight: 700;
        }

        .profile-modal-name .verified-badge {
            position: relative;
            top: auto;
            right: auto;
            display: inline-block;
            width: 20px;
            height: 20px;
            font-size: 11px;
            margin-left: 4px;
        }

        .profile-modal-status {
            text-align: center;
            font-size: 14px;
            color: rgba(17, 42, 70, 0.5);
            margin-top: 2px;
            font-family: "Inter", sans-serif;
        }

        .profile-modal-details {
            margin-top: 14px;
            display: grid;
            gap: 6px;
            background: rgba(17, 42, 70, 0.03);
            padding: 10px 14px;
            border-radius: 12px;
        }

        .profile-modal-details .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(17, 42, 70, 0.04);
            font-family: "Inter", sans-serif;
            font-size: 14px;
        }

        .profile-modal-details .detail-item:last-child {
            border-bottom: none;
        }

        .profile-modal-details .detail-item .label {
            color: rgba(17, 42, 70, 0.4);
            font-weight: 500;
        }

        .profile-modal-details .detail-item .value {
            color: #112A46;
            font-weight: 600;
        }

        .profile-modal-bio {
            margin-top: 10px;
            padding: 10px 14px;
            background: rgba(17, 42, 70, 0.04);
            border-radius: 10px;
            font-family: "Inter", sans-serif;
            font-size: 14px;
            color: rgba(17, 42, 70, 0.7);
            line-height: 1.6;
        }

        .profile-modal-interests {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
            margin-bottom: 12px;
        }

        .profile-modal-interests .tag {
            padding: 4px 14px;
            background: rgba(17, 42, 70, 0.06);
            border-radius: 50px;
            font-size: 12px;
            color: #112A46;
            font-family: "Inter", sans-serif;
            font-weight: 500;
        }

        .modal-photos-container {
            margin: 10px 0 8px;
            border-radius: 12px;
            overflow: hidden;
            background: #e8ecf0;
            position: relative;
            max-height: 350px;
        }

        .modal-carousel-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        .modal-carousel-slides {
            display: flex;
            transition: transform 0.5s ease;
            touch-action: pan-y;
        }

        .modal-carousel-slide {
            min-width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: #e8ecf0;
        }

        .modal-carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 16px;
            cursor: pointer;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-carousel-btn:hover {
            background: rgba(0, 0, 0, 0.7);
        }

        .modal-carousel-btn.prev { left: 8px; }
        .modal-carousel-btn.next { right: 8px; }

        .modal-carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 6px 0 2px;
            background: transparent;
        }

        .modal-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(17, 42, 70, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .modal-dot.active {
            background: #112A46;
            width: 24px;
            border-radius: 4px;
        }

        .profile-modal .btn-message-profile {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(135deg, #112A46, #2E5A88);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
        }

        .profile-modal .btn-message-profile:hover {
            background: linear-gradient(135deg, #2E5A88, #112A46);
            transform: translateY(-2px);
        }

        /* ============================================================ */
        /* TOAST                                                       */
        /* ============================================================ */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 24px;
            background: #112A46;
            color: #fff;
            border-radius: 12px;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            font-size: 14px;
            z-index: 999;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success {
            background: #28a745;
        }
        .toast.error {
            background: #dc3545;
        }

        /* ============================================================ */
        /* RESPONSIVE                                                   */
        /* ============================================================ */
        @media (max-width: 768px) {
            .members-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .members-header h1 {
                font-size: 28px;
            }

            .members-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .member-card__image-wrapper {
                aspect-ratio: 1/1;
            }

            .member-card__info {
                padding: 10px 12px 12px;
            }

            .member-card__name h3 {
                font-size: 15px;
            }

            .member-card__name .age {
                font-size: 12px;
            }

            .member-card__location {
                font-size: 11px;
            }

            .member-card__bio {
                font-size: 11px;
                -webkit-line-clamp: 1;
            }

            .interest-tag {
                font-size: 9px;
                padding: 1px 8px;
            }

            .member-card__actions button {
                font-size: 13px;
                padding: 10px 12px;
            }

            .view-toggle button {
                padding: 6px 12px;
                font-size: 12px;
            }

            .carousel-btn {
                width: 22px;
                height: 22px;
                font-size: 11px;

<body>

    <!-- ============================================================ -->
    <!-- HEADER - WITH 3-LINE MENU                                    -->
    <!-- ============================================================ -->
    <header class="cb-shell-header" role="banner">
        <div class="cb-shell-header__inner">
            <a class="cb-shell-brand" href="/">Classy<span>Date</span></a>

            <!-- ✅ 3-Line Hamburger Menu -->
            <div class="menu-container">
                <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">☰</button>
                <div class="menu-dropdown" id="menuDropdown">
                    <a href="#" onclick="logoutUser()" class="logout-btn">🚪 Log out</a>
                </div>
            </div>
        </div>
    </header>

    <!-- ============================================================ -->
    <!-- MAIN CONTENT                                                  -->
    <!-- ============================================================ -->
    <main class="members-wrapper">
        <div class="members-header">
            <div>
                <h1>Browse <span>Members</span></h1>
                <span class="member-count">Showing <strong id="total-count">0</strong> members</span>
            </div>
            <div class="view-toggle">
                <button class="active" onclick="setView('grid')" id="grid-view">▦ Grid</button>
                <button onclick="setView('list')" id="list-view">☰ List</button>
            </div>
        </div>

        <!-- Members Grid -->
        <div class="members-grid" id="members-grid"></div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </main>

    <!-- ============================================================ -->
    <!-- PROFILE MODAL                                                -->
    <!-- ============================================================ -->
    <div class="profile-modal" id="profile-modal">
        <div class="profile-modal-content">
            <button class="profile-modal-close" onclick="closeProfileModal()">✕</button>
            
            <img class="profile-modal-avatar" id="modal-avatar" src="" alt="Profile">
            <h2 class="profile-modal-name" id="modal-name">Name</h2>
            <div class="profile-modal-status" id="modal-status-text">📍 Location</div>

            <div class="profile-modal-details" id="modal-details">
                <div class="detail-item">
                    <span class="label">Age</span>
                    <span class="value" id="modal-age">—</span>
                </div>
                <div class="detail-item">
                    <span class="label">Gender</span>
                    <span class="value" id="modal-gender">—</span>
                </div>
                <div class="detail-item">
                    <span class="label">Location</span>
                    <span class="value" id="modal-location">—</span>
                </div>
                <div class="detail-item">
                    <span class="label">Status</span>
                    <span class="value" id="modal-status">—</span>
                </div>
                <div class="detail-item">
                    <span class="label">Verified</span>
                    <span class="value" id="modal-verified">—</span>
                </div>
                <div class="detail-item">
                    <span class="label">Premium</span>
                    <span class="value" id="modal-premium">—</span>
                </div>
            </div>

            <div class="profile-modal-bio" id="modal-bio">No bio available.</div>
            <div class="profile-modal-interests" id="modal-interests"></div>

            <div class="modal-photos-container" id="modal-photos-container">
                <div class="modal-carousel-wrapper" id="modal-carousel-wrapper">
                    <div class="modal-carousel-slides" id="modal-carousel-slides"></div>
                    <button class="modal-carousel-btn prev" onclick="event.stopPropagation(); changeModalPhoto(-1)">‹</button>
                    <button class="modal-carousel-btn next" onclick="event.stopPropagation(); changeModalPhoto(1)">›</button>
                </div>
                <div class="modal-carousel-dots" id="modal-carousel-dots"></div>
            </div>

            <button class="btn-message-profile" id="modal-message-btn" onclick="modalSendMessage()">💬 Send Message</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- ============================================================ -->
    <!-- SCRIPTS                                                      -->
    <!-- ============================================================ -->
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
            }
        }
    </script>

    <script type="module">
        import { createClient } from "@supabase/supabase-js";

        const SUPABASE_URL = 'https://ehfnzsfnsoiyiwpxqmli.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ybgZxnGuU_Gt35rfqkEdBw_YkEdD8vl';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        console.log('🔥 Supabase connected!');

        let allMembers = [];
        let filteredMembers = [];
        let currentPage = 1;
        const perPage = 6;
        let currentView = 'grid';
        let isLoading = true;
        let selectedMemberId = null;

        const photoIndexMap = {};
        const carouselIntervals = {};

        const grid = document.getElementById('members-grid');
        const paginationContainer = document.getElementById('pagination');
        const totalCount = document.getElementById('total-count');

        let modalPhotoIndex = 0;

        function getPhotoUrl(fileId) {
            if (!fileId) return null;
            try {
                const { data } = supabase.storage.from('member_photos').getPublicUrl(fileId);
                return data?.publicUrl || null;
            } catch (error) {
                console.warn('Error getting photo URL for:', fileId, error);
                return null;
            }
        }

        // ============================================================
        // ✅ MENU FUNCTIONS
        // ============================================================
        window.toggleMenu = function() {
            const dropdown = document.getElementById('menuDropdown');
            dropdown.classList.toggle('show');
        }

        // Close menu when clicking outside
        document.addEventListener('click', function(e) {
            const container = document.querySelector('.menu-container');
            if (container && !container.contains(e.target)) {
                document.getElementById('menuDropdown').classList.remove('show');
            }
        });

        window.logoutUser = function() {
            localStorage.removeItem('classydate_user');
            window.location.href = 'login.html';
        }

        // ============================================================
        // 🔥 FIX: LOAD MEMBERS - ONLY SHOW ADMIN-CREATED (verified = true)
        // ============================================================
        async function loadMembers() {
            try {
                // 🔥 KEY FIX: Only load members where verified = true
                const { data, error } = await supabase
                    .from('members')
                    .select('*')
                    .eq('verified', true)  // 🔥 THIS IS THE FIX!
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allMembers = data || [];
                isLoading = false;
                console.log('📊 Admin members loaded from Supabase:', allMembers.length);
                console.log('📊 Member data:', allMembers);
                
                totalCount.textContent = allMembers.length;
                filteredMembers = [...allMembers];
                renderMembers(filteredMembers);
                updatePagination(filteredMembers.length);
                
            } catch (error) {
                console.error('Error loading members:', error);
                showToast('Error loading members from Supabase: ' + error.message, 'error');
                isLoading = false;
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">⚠️</div>
                        <h3>Could not load members</h3>
                        <p>Please check your Supabase connection.</p>
                    </div>
                `;
            }
        }

        window.changePhoto = function(memberId, direction) {
            const wrapper = document.querySelector(`.member-card__image-wrapper[data-member="${memberId}"]`);
            if (!wrapper) return;

            const slides = wrapper.querySelector('.carousel-slides');
            if (!slides) return;
            const totalSlides = slides.children.length;
            if (totalSlides <= 1) return;

            if (!photoIndexMap[memberId]) photoIndexMap[memberId] = 0;
            let current = photoIndexMap[memberId];

            let newIndex = current + direction;
            if (newIndex < 0) newIndex = totalSlides - 1;
            if (newIndex >= totalSlides) newIndex = 0;

            slides.style.transform = `translateX(-${newIndex * 100}%)`;
            photoIndexMap[memberId] = newIndex;

            const dots = wrapper.querySelectorAll('.dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === newIndex);
            });
        }

        function startCarousel(memberId) {
            if (carouselIntervals[memberId]) clearInterval(carouselIntervals[memberId]);
            const wrapper = document.querySelector(`.member-card__image-wrapper[data-member="${memberId}"]`);
            if (!wrapper) return;
            const slides = wrapper.querySelector('.carousel-slides');
            if (!slides || slides.children.length <= 1) return;

            carouselIntervals[memberId] = setInterval(() => {
                window.changePhoto(memberId, 1);
            }, 3500);
        }

        function stopCarousel(memberId) {
            if (carouselIntervals[memberId]) {
                clearInterval(carouselIntervals[memberId]);
                delete carouselIntervals[memberId];
            }
        }

        function renderMembers(members) {
            console.log('🎨 Rendering members:', members.length);
            
            if (isLoading) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:60px;color:rgba(17,42,70,0.3);">
                        <span style="display:inline-block;width:32px;height:32px;border:3px solid rgba(17,42,70,0.1);border-top-color:#112A46;border-radius:50%;animation:spin 0.8s linear infinite;"></span>
                        <br><br>Loading members...
                    </div>
                `;
                return;
            }

            if (members.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">💎</div>
                        <h3>No members yet</h3>
                        <p>Check back soon for amazing people!</p>
                        <p style="margin-top:12px;font-size:13px;color:rgba(17,42,70,0.3);">
                            Only admin-approved members are shown here.
                        </p>
                    </div>
                `;
                return;
            }

            totalCount.textContent = members.length;

            grid.innerHTML = members.map(member => {
                let photos = [];
                if (member.photo_file_ids && member.photo_file_ids.length > 0) {
                    photos = member.photo_file_ids
                        .map(id => getPhotoUrl(id))
                        .filter(url => url !== null && url !== '');
                }

                const memberName = member.name || 'User';
                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=112A46&color=fff&size=400`;
                
                if (photos.length === 0) {
                    photos = [avatarUrl];
                }

                let slidesHTML = '';
                photos.forEach((photo, index) => {
                    slidesHTML += `
                        <div class="carousel-slide" style="min-width:100%;aspect-ratio:1/1;overflow:hidden;">
                            <img src="${photo}" alt="${memberName}" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=112A46&color=fff&size=400'">
                        </div>
                    `;
                });

                let dotsHTML = '';
                for (let i = 0; i < photos.length; i++) {
                    dotsHTML += `<span class="dot ${i === 0 ? 'active' : ''}"></span>`;
                }

                const verifiedHTML = member.verified ? `<span class="verified-badge">✓</span>` : '';
                
                const statusHTML = member.online ? `
                    <span class="status-dot status-dot--online"></span> Online
                ` : '';

                return `
                    <div class="member-card" data-id="${member.id}">
                        <div class="member-card__image-wrapper" data-member="${member.id}">
                            <div class="carousel-slides" style="display:flex;transition:transform 0.5s ease;">
                                ${slidesHTML}
                            </div>
                            ${verifiedHTML}
                            ${photos.length > 1 ? `
                                <button class="carousel-btn prev" onclick="event.stopPropagation(); window.changePhoto('${member.id}', -1)">‹</button>
                                <button class="carousel-btn next" onclick="event.stopPropagation(); window.changePhoto('${member.id}', 1)">›</button>
                                <div class="image-dots">${dotsHTML}</div>
                            ` : ''}
                            ${statusHTML ? `<div class="member-card__status">${statusHTML}</div>` : ''}
                        </div>
                        <div class="member-card__info">
                            <div class="member-card__name">
                                <h3>${memberName}</h3>
                                <span class="age">${member.age || '?'}</span>
                            </div>
                            <div class="member-card__location">📍 ${member.location || 'Location Unknown'}</div>
                            <div class="member-card__bio">${member.about_me || member.bio || 'No bio yet.'}</div>
                            <div class="member-card__interests">
                                ${(member.interests || []).map(i => `<span class="interest-tag">#${i}</span>`).join('')}
                            </div>
                            <div class="member-card__actions">
                                <button class="btn-view" onclick="window.openProfileModal('${member.id}')">👤 View</button>
                                <button class="btn-message" onclick="window.sendMessage('${member.id}')">💬 Message</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            members.forEach(member => {
                startCarousel(member.id);
            });

            updatePagination(members.length);
        }

        window.setView = function(view) {
            currentView = view;
            grid.className = 'members-grid' + (view === 'list' ? ' list-view' : '');
            document.getElementById('grid-view').classList.toggle('active', view === 'grid');
            document.getElementById('list-view').classList.toggle('active', view === 'list');
            renderMembers(filteredMembers);
        }

        function updatePagination(total) {
            const pages = Math.ceil(total / perPage);
            if (pages <= 1) {
                paginationContainer.innerHTML = '';
                return;
            }

            let html = `<button onclick="window.goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹ Prev</button>`;
            for (let i = 1; i <= Math.min(pages, 5); i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="window.goToPage(${i})">${i}</button>`;
            }
            if (pages > 5) {
                html += `<span style="color:rgba(17,42,70,0.15);padding:8px;">…</span>`;
                html += `<button onclick="window.goToPage(${pages})">${pages}</button>`;
            }
            html += `<button onclick="window.goToPage(${currentPage + 1})" ${currentPage === pages ? 'disabled' : ''}>Next ›</button>`;

            paginationContainer.innerHTML = html;
        }

        window.goToPage = function(page) {
            const total = filteredMembers.length;
            const pages = Math.ceil(total / perPage);
            if (page < 1 || page > pages) return;
            currentPage = page;
            renderMembers(filteredMembers);
        }

        // ============================================================
        // PROFILE MODAL FUNCTIONS
        // ============================================================
        window.openProfileModal = function(id) {
            const member = allMembers.find(m => m.id === id);
            if (!member) {
                showToast('❌ Member not found', 'error');
                return;
            }

            selectedMemberId = id;

            let photos = [];
            if (member.photo_file_ids && member.photo_file_ids.length > 0) {
                photos = member.photo_file_ids
                    .map(id => getPhotoUrl(id))
                    .filter(url => url !== null && url !== '');
            }

            const memberName = member.name || 'User';
            let mainPhoto = `https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=112A46&color=fff&size=400`;
            if (photos.length > 0) {
                mainPhoto = photos[0];
            }

            document.getElementById('modal-avatar').src = mainPhoto;
            document.getElementById('modal-avatar').onerror = function() {
                this.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=112A46&color=fff&size=200`;
            };

            let nameHTML = memberName;
            if (member.verified) nameHTML += ' <span class="verified-badge" style="position:relative;top:auto;right:auto;display:inline-block;width:20px;height:20px;font-size:11px;margin-left:4px;">✓</span>';
            if (member.premium) nameHTML += ' ⭐';
            document.getElementById('modal-name').innerHTML = nameHTML;

            document.getElementById('modal-status-text').textContent = `📍 ${member.location || 'Location Unknown'}`;

            document.getElementById('modal-age').textContent = member.age || '—';
            document.getElementById('modal-gender').textContent = member.gender || '—';
            document.getElementById('modal-location').textContent = member.location || '—';
            document.getElementById('modal-status').innerHTML = member.online ? '🟢 Online' : '⚪ Offline';
            document.getElementById('modal-verified').textContent = member.verified ? '✅ Yes' : '❌ No';
            document.getElementById('modal-premium').textContent = member.premium ? '⭐ Yes' : '—';

            document.getElementById('modal-bio').textContent = member.about_me || member.bio || 'No bio available.';

            const interestsContainer = document.getElementById('modal-interests');
            if (member.interests && member.interests.length > 0) {
                interestsContainer.innerHTML = member.interests.map(i => `<span class="tag">#${i}</span>`).join('');
            } else {
                interestsContainer.innerHTML = '<span style="color:rgba(17,42,70,0.3);font-size:14px;">No interests listed</span>';
            }

            const slidesContainer = document.getElementById('modal-carousel-slides');
            const dotsContainer = document.getElementById('modal-carousel-dots');
            
            modalPhotoIndex = 0;

            if (photos.length > 0) {
                let slidesHTML = '';
                photos.forEach((photo, index) => {
                    slidesHTML += `
                        <div class="modal-carousel-slide">
                            <img src="${photo}" alt="Photo ${index + 1}" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=112A46&color=fff&size=400'">
                        </div>
                    `;
                });
                slidesContainer.innerHTML = slidesHTML;
                slidesContainer.style.transform = 'translateX(0%)';

                let dotsHTML = '';
                photos.forEach((_, index) => {
                    dotsHTML += `<span class="modal-dot ${index === 0 ? 'active' : ''}"></span>`;
                });
                dotsContainer.innerHTML = dotsHTML;

                const prevBtn = document.querySelector('.modal-carousel-btn.prev');
                const nextBtn = document.querySelector('.modal-carousel-btn.next');
                if (photos.length <= 1) {
                    prevBtn.style.display = 'none';
                    nextBtn.style.display = 'none';
                } else {
                    prevBtn.style.display = 'flex';
                    nextBtn.style.display = 'flex';
                }

                document.getElementById('modal-photos-container').style.display = 'block';
            } else {
                slidesContainer.innerHTML = `
                    <div class="modal-carousel-slide" style="display:flex;align-items:center;justify-content:center;background:#e8ecf0;color:rgba(17,42,70,0.3);font-family:'Inter',sans-serif;font-size:16px;">
                        No photos available
                    </div>
                `;
                dotsContainer.innerHTML = '';
                document.getElementById('modal-photos-container').style.display = 'block';
            }

            document.getElementById('modal-message-btn').onclick = function() {
                window.sendMessage(id);
            };

            document.getElementById('profile-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        window.changeModalPhoto = function(direction) {
            const slides = document.getElementById('modal-carousel-slides');
            const dots = document.querySelectorAll('.modal-dot');
            
            if (!slides) return;
            
            const totalSlides = slides.children.length;
            if (totalSlides <= 1) return;
            
            let newIndex = modalPhotoIndex + direction;
            if (newIndex < 0) newIndex = totalSlides - 1;
            if (newIndex >= totalSlides) newIndex = 0;
            
            slides.style.transform = `translateX(-${newIndex * 100}%)`;
            modalPhotoIndex = newIndex;
            
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === newIndex);
            });
        }

        // Touch swipe support
        let touchStartX = 0;

        document.addEventListener('DOMContentLoaded', function() {
            const modalContent = document.querySelector('.profile-modal-content');
            
            modalContent.addEventListener('touchstart', function(e) {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            modalContent.addEventListener('touchend', function(e) {
                const touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;
                
                if (Math.abs(diff) > 50) {
                    if (diff > 0) {
                        window.changeModalPhoto(1);
                    } else {
                        window.changeModalPhoto(-1);
                    }
                }
            }, { passive: true });
        });

        window.closeProfileModal = function() {
            document.getElementById('profile-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('profile-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeProfileModal();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeProfileModal();
            }
        });

        window.modalSendMessage = function() {
            if (selectedMemberId) {
                window.sendMessage(selectedMemberId);
            }
        }

        window.sendMessage = function(id) {
            const member = allMembers.find(m => m.id === id);
            if (!member) {
                showToast('❌ Member not found', 'error');
                return;
            }

            closeProfileModal();

            const user = localStorage.getItem('classydate_user');
            if (!user) {
                showToast('🔒 Please log in to send messages', 'error');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                return;
            }

            window.location.href = `chat.html?user=${id}&name=${encodeURIComponent(member.name)}`;
        }

        // ============================================================
        // TOAST
        // ============================================================
        let toastTimeout;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        // INIT
        // ============================================================
        loadMembers();

        const style = document.createElement('style');
        style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
        document.head.appendChild(style);

        console.log('💎 ClassyDate Members Page - FIXED!');
        console.log('✅ ONLY showing admin-created members (verified = true)');
        console.log('❌ Regular sign-ups (verified = false) are HIDDEN');
        console.log('👑 Admin: Go to admin panel to add members that appear here');
    </script>

</body>
</html>
