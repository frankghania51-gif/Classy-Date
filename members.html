<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Members | ClassyDate</title>
    <meta name="description" content="Browse ClassyDate members and find meaningful connections.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f3e8ff;
            color: #1a0533;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; }

        /* ============================================================ */
        /* HEADER - MODERN PURPLE THEME                                */
        /* ============================================================ */
        .cb-shell-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(108, 60, 179, 0.12);
        }

        .cb-shell-header__inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cb-shell-brand {
            display: flex;
            align-items: center;
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 24px;
            font-weight: 700;
            color: #1a0533;
        }
        .cb-shell-brand span {
            font-family: "Inter", sans-serif;
            font-weight: 300;
            color: #6c3cb3;
        }

        .menu-container {
            position: relative;
            display: inline-block;
        }

        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            font-size: 28px;
            color: #1a0533;
            transition: all 0.3s ease;
            border-radius: 8px;
        }

        .menu-btn:hover {
            background: rgba(108, 60, 179, 0.08);
        }

        .menu-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 50px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            min-width: 180px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            z-index: 200;
        }

        .menu-dropdown.show {
            display: block;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-dropdown a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            color: #1a0533;
            font-size: 14px;
            font-weight: 500;
            font-family: "Inter", sans-serif;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(108, 60, 179, 0.06);
        }

        .menu-dropdown a:last-child {
            border-bottom: none;
        }

        .menu-dropdown a:hover {
            background: rgba(108, 60, 179, 0.06);
        }

        .menu-dropdown .logout-btn {
            color: #dc3545;
            font-weight: 600;
        }

        .menu-dropdown .logout-btn:hover {
            background: rgba(220, 53, 69, 0.06);
        }

        /* ============================================================ */
        /* MEMBERS WRAPPER                                             */
        /* ============================================================ */
        .members-wrapper {
            flex: 1;
            padding: 100px 0 60px;
            max-width: 100%;
            margin: 0;
            width: 100%;
        }

        .members-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            padding: 0 16px;
        }

        .members-header h1 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 28px;
            color: #1a0533;
            font-weight: 700;
        }

        .members-header .member-count {
            color: rgba(26, 5, 51, 0.5);
            font-size: 14px;
            font-family: "Inter", sans-serif;
        }

        .members-header .member-count strong {
            color: #1a0533;
            font-weight: 700;
        }

        .view-toggle {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 4px;
            border: 1px solid rgba(108, 60, 179, 0.12);
        }

        .view-toggle button {
            padding: 6px 14px;
            background: none;
            border: none;
            border-radius: 8px;
            color: rgba(26, 5, 51, 0.4);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
            font-weight: 600;
        }

        .view-toggle button.active {
            background: #6c3cb3;
            color: #fff;
        }
        .view-toggle button:hover:not(.active) {
            color: rgba(26, 5, 51, 0.7);
        }

        /* ============================================================ */
        /* GRID                                                        */
        /* ============================================================ */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            padding: 0;
            width: 100%;
        }

        /* ============================================================ */
        /* MEMBER CARD                                                 */
        /* ============================================================ */
        .member-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            overflow: hidden;
            border: 1px solid rgba(108, 60, 179, 0.08);
            transition: all 0.4s ease;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            width: 100%;
            border-radius: 0;
        }

        .member-card:hover {
            transform: translateY(-2px);
            border-color: rgba(108, 60, 179, 0.2);
            box-shadow: 0 4px 16px rgba(108, 60, 179, 0.1);
        }

        .member-card.long-press {
            background: rgba(108, 60, 179, 0.08);
            transform: scale(0.98);
        }

        /* ============================================================ */
        /* IMAGE WRAPPER                                               */
        /* ============================================================ */
        .member-card__image-wrapper {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1/1;
            background: #e8d5f5;
            max-height: 200px;
            width: 100%;
        }

        .member-card__image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .member-card:hover .member-card__image-wrapper img {
            transform: scale(1.03);
        }

        .carousel-slides {
            display: flex;
            transition: transform 0.8s ease;
            height: 100%;
            width: 100%;
        }

        .carousel-slide {
            min-width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
            flex-shrink: 0;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(26, 5, 51, 0.5);
            backdrop-filter: blur(4px);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            cursor: pointer;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .member-card:hover .carousel-btn {
            opacity: 1;
        }

        .carousel-btn:hover {
            background: rgba(26, 5, 51, 0.8);
        }

        .carousel-btn.prev { left: 4px; }
        .carousel-btn.next { right: 4px; }

        /* ============================================================ */
        /* ✅ ONLINE DOT - TOP RIGHT                                   */
        /* ============================================================ */
        .online-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 5;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #28a745;
            border: 2.5px solid #FFFFFF;
            box-shadow: 0 0 12px rgba(40, 167, 69, 0.6);
            animation: pulse-online 1.8s infinite;
            pointer-events: none;
        }

        .online-dot.offline {
            background: #adb5bd;
            animation: none;
            box-shadow: none;
        }

        @keyframes pulse-online {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }

        /* ============================================================ */
        /* ✅ LOVE ICON - BOTTOM RIGHT                                 */
        /* ============================================================ */
        .love-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            z-index: 5;
            background: rgba(26, 5, 51, 0.4);
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: #fff;
            pointer-events: auto;
        }

        .love-btn:hover {
            transform: scale(1.15);
            background: rgba(26, 5, 51, 0.6);
        }

        .love-btn.liked {
            color: #ff0000;
            background: rgba(255, 0, 0, 0.2);
        }

        .love-btn.liked:hover {
            background: rgba(255, 0, 0, 0.3);
        }

        /* ============================================================ */
        /* VERIFIED BADGE - NEXT TO NAME                              */
        /* ============================================================ */
        .verified-badge-name {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #1DA1F2;
            color: #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            font-weight: 700;
            border: 1.5px solid #fff;
            box-shadow: 0 1px 4px rgba(29, 161, 242, 0.3);
            flex-shrink: 0;
        }

        /* ============================================================ */
        /* CARD INFO - LABEL FORMAT                                   */
        /* ============================================================ */
        .member-card__info {
            padding: 10px 12px 12px;
        }

        .member-card__info .detail-line {
            font-size: 13px;
            color: #1a0533;
            font-family: "Inter", sans-serif;
            padding: 2px 0;
            line-height: 1.5;
        }

        .member-card__info .detail-line .label {
            font-weight: 600;
            color: rgba(26, 5, 51, 0.5);
        }

        .member-card__info .detail-line .value {
            font-weight: 500;
            color: #1a0533;
        }

        .member-card__name-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .member-card__name-row h3 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 16px;
            font-weight: 700;
            color: #1a0533;
        }

        /* ============================================================ */
        /* BUTTONS                                                     */
        /* ============================================================ */
        .member-card__actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(108, 60, 179, 0.08);
        }

        .member-card__actions button {
            flex: 1;
            padding: 8px 10px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
        }

        .btn-view {
            background: rgba(108, 60, 179, 0.1);
            color: #1a0533;
        }
        .btn-view:hover {
            background: rgba(108, 60, 179, 0.2);
            transform: translateY(-2px);
        }

        .btn-message {
            background: linear-gradient(135deg, #6c3cb3, #4a1a6b);
            color: #fff;
        }
        .btn-message:hover {
            background: linear-gradient(135deg, #4a1a6b, #6c3cb3);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(108, 60, 179, 0.25);
        }

        /* ============================================================ */
        /* EMPTY STATE                                                 */
        /* ============================================================ */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(26, 5, 51, 0.3);
            grid-column: 1 / -1;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-state h3 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 22px;
            color: #1a0533;
            margin-bottom: 6px;
        }

        .empty-state p {
            font-family: "Inter", sans-serif;
        }

        /* ============================================================ */
        /* PAGINATION                                                  */
        /* ============================================================ */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            padding: 0 16px;
        }

        .pagination button {
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(108, 60, 179, 0.1);
            border-radius: 6px;
            color: rgba(26, 5, 51, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            font-size: 12px;
        }

        .pagination button:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        .pagination button.active {
            background: #6c3cb3;
            color: #fff;
            border-color: #6c3cb3;
        }
        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ============================================================ */
        /* SHARE TOAST                                                 */
        /* ============================================================ */
        .share-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(26, 5, 51, 0.95);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            font-size: 13px;
            z-index: 999;
            opacity: 0;
            transition: all 0.4s ease;
            text-align: center;
            max-width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .share-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .share-toast .close-share {
            background: none;
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            padding: 0 0 0 10px;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .share-toast .close-share:hover {
            opacity: 1;
        }

        .share-toast .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            background: #25D366;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            margin-top: 6px;
            font-family: "Inter", sans-serif;
            transition: all 0.3s ease;
        }

        .share-toast .share-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(37, 211, 102, 0.3);
        }

        /* ============================================================ */
        /* TOAST                                                       */
        /* ============================================================ */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 20px;
            background: #1a0533;
            color: #fff;
            border-radius: 10px;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            font-size: 13px;
            z-index: 999;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 360px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success {
            background: #28a745;
        }
        .toast.error {
            background: #dc3545;
        }

        /* ============================================================ */
        /* RESPONSIVE                                                  */
        /* ============================================================ */
        @media (max-width: 768px) {
            .members-wrapper {
                padding: 90px 0 40px;
            }
            .members-header {
                padding: 0 10px;
                margin-bottom: 12px;
            }
            .members-header h1 {
                font-size: 22px;
            }
            .members-grid {
                gap: 3px;
            }
            .member-card__image-wrapper {
                max-height: 170px;
            }
            .member-card__info {
                padding: 8px 8px 10px;
            }
            .member-card__info .detail-line {
                font-size: 12px;
            }
            .member-card__name-row h3 {
                font-size: 14px;
            }
            .member-card__actions {
                gap: 4px;
                margin-top: 8px;
                padding-top: 8px;
            }
            .member-card__actions button {
                font-size: 10px;
                padding: 6px 8px;
            }
            .online-dot {
                width: 12px;
                height: 12px;
                top: 6px;
                right: 6px;
            }
            .love-btn {
                width: 28px;
                height: 28px;
                font-size: 15px;
                bottom: 6px;
                right: 6px;
            }
            .carousel-btn {
                width: 20px;
                height: 20px;
                font-size: 10px;
            }
            .toast {
                bottom: 20px;
                right: 20px;
                left: 20px;
                text-align: center;
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .members-wrapper {
                padding: 80px 0 30px;
            }
            .members-header h1 {
                font-size: 18px;
            }
            .members-header .member-count {
                font-size: 12px;
            }
            .view-toggle button {
                font-size: 11px;
                padding: 4px 10px;
            }
            .members-grid {
                gap: 2px;
            }
            .member-card__image-wrapper {
                max-height: 140px;
            }
            .member-card__info {
                padding: 6px 6px 8px;
            }
            .member-card__info .detail-line {
                font-size: 11px;
                padding: 1px 0;
            }
            .member-card__name-row h3 {
                font-size: 12px;
            }
            .member-card__actions button {
                font-size: 9px;
                padding: 4px 6px;
                border-radius: 4px;
            }
            .online-dot {
                width: 10px;
                height: 10px;
                top: 4px;
                right: 4px;
                border-width: 2px;
            }
            .love-btn {
                width: 24px;
                height: 24px;
                font-size: 13px;
                bottom: 4px;
                right: 4px;
            }
            .carousel-btn {
                width: 18px;
                height: 18px;
                font-size: 9px;
            }
            .verified-badge-name {
                width: 14px;
                height: 14px;
                font-size: 8px;
            }
            .pagination button {
                font-size: 11px;
                padding: 3px 10px;
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    /* HEADER                                                        */
    <!-- ============================================================ -->
    <header class="cb-shell-header" role="banner">
        <div class="cb-shell-header__inner">
            <a class="cb-shell-brand" href="/">Classy<span>Date</span></a>
            <div class="menu-container">
                <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">☰</button>
                <div class="menu-dropdown" id="menuDropdown">
                    <a href="#" onclick="logoutUser()" class="logout-btn">🚪 Log out</a>
                </div>
            </div>
        </div>
    </header>

    <!-- ============================================================ -->
    /* MAIN CONTENT                                                  */
    <!-- ============================================================ -->
    <main class="members-wrapper">
        <div class="members-header">
            <div>
                <h1>Browse <span>Members</span></h1>
                <span class="member-count">Showing <strong id="total-count">0</strong> members</span>
            </div>
            <div class="view-toggle">
                <button class="active" onclick="setView('grid')" id="grid-view">▦ Grid</button>
                <button onclick="setView('list')" id="list-view">☰ List</button>
            </div>
        </div>

        <div class="members-grid" id="members-grid"></div>
        <div class="pagination" id="pagination"></div>
    </main>

    <!-- ============================================================ -->
    /* SHARE TOAST                                                  */
    <!-- ============================================================ -->
    <div class="share-toast" id="share-toast">
        <div style="display:flex;align-items:center;justify-content:space-between;">
            <span>📤 Share this member via WhatsApp</span>
            <button class="close-share" onclick="closeShareToast()">✕</button>
        </div>
        <button class="share-btn" id="share-whatsapp-btn">
            <span class="icon">💬</span> Share on WhatsApp
        </button>
    </div>

    <!-- ============================================================ -->
    /* TOAST                                                       */
    <!-- ============================================================ -->
    <div class="toast" id="toast"></div>

    <!-- ============================================================ -->
    /* SCRIPTS                                                      */
    <!-- ============================================================ -->
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
            }
        }
    </script>

    <script type="module">
        import { createClient } from "@supabase/supabase-js";

        const SUPABASE_URL = 'https://ehfnzsfnsoiyiwpxqmli.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ybgZxnGuU_Gt35rfqkEdBw_YkEdD8vl';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        console.log('🔥 Supabase connected!');

        let allMembers = [];
        let filteredMembers = [];
        let currentPage = 1;
        const perPage = 6;
        let currentView = 'grid';
        let isLoading = true;
        let selectedMemberId = null;

        const photoIndexMap = {};
        const carouselIntervals = {};

        const grid = document.getElementById('members-grid');
        const paginationContainer = document.getElementById('pagination');
        const totalCount = document.getElementById('total-count');

        // Track liked members
        const likedMembers = new Set();

        function getPhotoUrl(fileId) {
            if (!fileId) return null;
            try {
                const { data } = supabase.storage.from('member_photos').getPublicUrl(fileId);
                return data?.publicUrl || null;
            } catch (error) {
                console.warn('Error getting photo URL for:', fileId, error);
                return null;
            }
        }

        window.toggleMenu = function() {
            const dropdown = document.getElementById('menuDropdown');
            dropdown.classList.toggle('show');
        }

        document.addEventListener('click', function(e) {
            const container = document.querySelector('.menu-container');
            if (container && !container.contains(e.target)) {
                document.getElementById('menuDropdown').classList.remove('show');
            }
        });

        window.logoutUser = function() {
            localStorage.removeItem('classy_user');
            localStorage.removeItem('classydate_user');
            localStorage.removeItem('classy_user_email');
            localStorage.removeItem('classy_user_name');
            localStorage.removeItem('classy_user_id');
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'login.html';
        }

        // ============================================================
        // LOAD MEMBERS
        // ============================================================
        async function loadMembers() {
            try {
                const { data, error } = await supabase
                    .from('members')
                    .select('*')
                    .eq('verified', true)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allMembers = data || [];
                isLoading = false;
                console.log('📊 Admin members loaded:', allMembers.length);
                
                totalCount.textContent = allMembers.length;
                filteredMembers = [...allMembers];
                renderMembers(filteredMembers);
                updatePagination(filteredMembers.length);
                
            } catch (error) {
                console.error('Error loading members:', error);
                showToast('Error loading members: ' + error.message, 'error');
                isLoading = false;
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">⚠️</div>
                        <h3>Could not load members</h3>
                        <p>Please check your connection.</p>
                    </div>
                `;
            }
        }

        // ============================================================
        // CHANGE PHOTO
        // ============================================================
        window.changePhoto = function(memberId, direction) {
            const wrapper = document.querySelector(`.member-card__image-wrapper[data-member="${memberId}"]`);
            if (!wrapper) return;

            const slides = wrapper.querySelector('.carousel-slides');
            if (!slides) return;
            const totalSlides = slides.children.length;
            if (totalSlides <= 1) return;

            if (!photoIndexMap[memberId]) photoIndexMap[memberId] = 0;
            let current = photoIndexMap[memberId];

            let newIndex = current + direction;
            if (newIndex < 0) newIndex = totalSlides - 1;
            if (newIndex >= totalSlides) newIndex = 0;

            slides.style.transform = `translateX(-${newIndex * 100}%)`;
            photoIndexMap[memberId] = newIndex;
        }

        // ============================================================
        // START CAROUSEL
        // ============================================================
        function startCarousel(memberId) {
            if (carouselIntervals[memberId]) clearInterval(carouselIntervals[memberId]);
            
            const wrapper = document.querySelector(`.member-card__image-wrapper[data-member="${memberId}"]`);
            if (!wrapper) return;
            
            const slides = wrapper.querySelector('.carousel-slides');
            if (!slides || slides.children.length <= 1) return;

            const randomDelay = 3500 + Math.random() * 2000;
            
            carouselIntervals[memberId] = setInterval(() => {
                window.changePhoto(memberId, 1);
            }, randomDelay);
        }

        function stopCarousel(memberId) {
            if (carouselIntervals[memberId]) {
                clearInterval(carouselIntervals[memberId]);
                delete carouselIntervals[memberId];
            }
        }

        // ============================================================
        // HANDLE LIKE
        // ============================================================
        window.handleLike = function(memberId, event) {
            event.stopPropagation();
            
            const btn = document.querySelector(`.love-btn[data-member="${memberId}"]`);
            if (!btn) return;

            if (likedMembers.has(memberId)) {
                likedMembers.delete(memberId);
                btn.classList.remove('liked');
                btn.textContent = '🤍';
                showToast('💔 Unliked', 'success');
            } else {
                likedMembers.add(memberId);
                btn.classList.add('liked');
                btn.textContent = '❤️';
                showToast('❤️ Liked!', 'success');
            }
        }

        // ============================================================
        // RENDER MEMBERS
        // ============================================================
        function renderMembers(members) {
            console.log('🎨 Rendering members:', members.length);
            
            if (isLoading) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:rgba(26,5,51,0.3);">
                        <span style="display:inline-block;width:30px;height:30px;border:3px solid rgba(108,60,179,0.1);border-top-color:#6c3cb3;border-radius:50%;animation:spin 0.8s linear infinite;"></span>
                        <br><br>Loading members...
                    </div>
                `;
                return;
            }

            if (members.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">💎</div>
                        <h3>No members yet</h3>
                        <p>Check back soon for amazing people!</p>
                    </div>
                `;
                return;
            }

            totalCount.textContent = members.length;

            grid.innerHTML = members.map(member => {
                let photos = [];
                if (member.photo_file_ids && member.photo_file_ids.length > 0) {
                    photos = member.photo_file_ids
                        .map(id => getPhotoUrl(id))
                        .filter(url => url !== null && url !== '');
                }

                const memberName = member.name || 'User';
                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=6c3cb3&color=fff&size=400`;
                
                if (photos.length === 0) {
                    photos = [avatarUrl];
                }

                let slidesHTML = '';
                photos.forEach((photo, index) => {
                    slidesHTML += `
                        <div class="carousel-slide">
                            <img src="${photo}" alt="${memberName}" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=6c3cb3&color=fff&size=400'">
                        </div>
                    `;
                });

                // Random online status
                const isOnline = Math.random() > 0.5;
                const onlineDot = isOnline ? 
                    `<span class="online-dot"></span>` : 
                    `<span class="online-dot offline"></span>`;

                // Verified badge next to name
                const verifiedBadgeName = member.verified ? 
                    `<span class="verified-badge-name">✓</span>` : '';

                // Check if already liked
                const isLiked = likedMembers.has(member.id);
                const loveIcon = isLiked ? '❤️' : '🤍';
                const likedClass = isLiked ? 'liked' : '';

                const currentLocation = member.current_location || member.location || 'Location Unknown';
                const homeCountry = member.home_country || member.origin || 'Not specified';

                return `
                    <div class="member-card" data-id="${member.id}" data-name="${memberName}" data-location="${currentLocation}" data-origin="${homeCountry}" data-age="${member.age || ''}" data-verified="${member.verified}">
                        <div class="member-card__image-wrapper" data-member="${member.id}">
                            <div class="carousel-slides" style="display:flex;transition:transform 0.8s ease;">
                                ${slidesHTML}
                            </div>
                            ${onlineDot}
                            <button class="love-btn ${likedClass}" data-member="${member.id}" onclick="window.handleLike('${member.id}', event)">
                                ${loveIcon}
                            </button>
                            ${photos.length > 1 ? `
                                <button class="carousel-btn prev" onclick="event.stopPropagation(); window.changePhoto('${member.id}', -1)">‹</button>
                                <button class="carousel-btn next" onclick="event.stopPropagation(); window.changePhoto('${member.id}', 1)">›</button>
                            ` : ''}
                        </div>
                        <div class="member-card__info">
                            <div class="member-card__name-row">
                                <h3>${memberName}</h3>
                                ${verifiedBadgeName}
                            </div>
                            <div class="detail-line">
                                <span class="label">Age: </span>
                                <span class="value">${member.age || '—'}</span>
                            </div>
                            <div class="detail-line">
                                <span class="label">Current Location: </span>
                                <span class="value">${currentLocation}</span>
                            </div>
                            <div class="detail-line">
                                <span class="label">Origin Country: </span>
                                <span class="value">${homeCountry}</span>
                            </div>
                            <div class="member-card__actions">
                                <button class="btn-view" onclick="event.stopPropagation(); window.viewProfile('${member.id}')">👤 View</button>
                                <button class="btn-message" onclick="event.stopPropagation(); window.sendMessage('${member.id}')">💬 Message</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            members.forEach(member => {
                startCarousel(member.id);
            });

            document.querySelectorAll('.member-card').forEach(card => {
                card.removeEventListener('click', handleCardClick);
                card.addEventListener('click', handleCardClick);
            });

            updatePagination(members.length);
        }

        // ============================================================
        // HANDLE CARD CLICK
        // ============================================================
        function handleCardClick(e) {
            if (e.target.closest('.btn-view') || e.target.closest('.btn-message') || e.target.closest('.carousel-btn') || e.target.closest('.love-btn')) {
                return;
            }
            const card = e.currentTarget;
            const id = card.dataset.id;
            if (id) {
                window.viewProfile(id);
            }
        }

        // ============================================================
        // VIEW PROFILE
        // ============================================================
        window.viewProfile = function(id) {
            const member = allMembers.find(m => m.id === id);
            if (!member) {
                showToast('❌ Member not found', 'error');
                return;
            }
            localStorage.setItem('classydate_selected_member', JSON.stringify(member));
            window.location.href = `profile.html?id=${id}`;
        }

        // ============================================================
        // SEND MESSAGE
        // ============================================================
        window.sendMessage = function(id) {
            const member = allMembers.find(m => m.id === id);
            if (!member) {
                showToast('❌ Member not found', 'error');
                return;
            }

            const user = localStorage.getItem('classy_user');
            if (!user) {
                showToast('🔒 Please log in to send messages', 'error');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                return;
            }

            localStorage.setItem('classydate_selected_member', JSON.stringify(member));
            
            const currentLocation = member.current_location || member.location || '';
            const homeCountry = member.home_country || member.origin || '';
            
            window.location.href = `chat.html?user=${id}&name=${encodeURIComponent(member.name)}&location=${encodeURIComponent(currentLocation)}&origin=${encodeURIComponent(homeCountry)}`;
        }

        // ============================================================
        // LONG PRESS TO SHARE
        // ============================================================
        let longPressTimer = null;
        let isLongPress = false;

        function setupLongPress(card) {
            card.addEventListener('touchstart', function(e) {
                isLongPress = false;
                longPressTimer = setTimeout(() => {
                    isLongPress = true;
                    handleLongPress(this, e);
                }, 600);
            });

            card.addEventListener('touchmove', function(e) {
                clearTimeout(longPressTimer);
            });

            card.addEventListener('touchend', function(e) {
                clearTimeout(longPressTimer);
                if (isLongPress) {
                    e.preventDefault();
                }
            });

            card.addEventListener('mousedown', function(e) {
                isLongPress = false;
                longPressTimer = setTimeout(() => {
                    isLongPress = true;
                    handleLongPress(this, e);
                }, 800);
            });

            card.addEventListener('mouseup', function(e) {
                clearTimeout(longPressTimer);
            });

            card.addEventListener('mouseleave', function(e) {
                clearTimeout(longPressTimer);
            });
        }

        function handleLongPress(card, event) {
            event.preventDefault();
            
            const id = card.dataset.id;
            const name = card.dataset.name || 'Member';
            const location = card.dataset.location || 'Unknown';
            const origin = card.dataset.origin || 'Not specified';
            const age = card.dataset.age || '?';
            const verified = card.dataset.verified === 'true';

            const member = allMembers.find(m => m.id === id);
            if (!member) return;

            const shareToast = document.getElementById('share-toast');
            shareToast.classList.add('show');

            const shareBtn = document.getElementById('share-whatsapp-btn');
            shareBtn.onclick = function() {
                shareOnWhatsApp(member);
            };

            card.classList.add('long-press');
            setTimeout(() => {
                card.classList.remove('long-press');
            }, 300);
        }

        window.closeShareToast = function() {
            document.getElementById('share-toast').classList.remove('show');
        }

        function shareOnWhatsApp(member) {
            const name = member.name || 'Member';
            const currentLocation = member.current_location || member.location || 'Unknown';
            const homeCountry = member.home_country || member.origin || 'Not specified';
            const age = member.age || '?';
            const verified = member.verified ? '✅ Verified Member' : '';

            const message = `
👤 *${name}* ${verified ? '✔️' : ''}
📍 Location: ${currentLocation}
🌍 Home Country: ${homeCountry}
🎂 Age: ${age}
💎 ClassyDate Member

---
Check out this member on ClassyDate!
https://classydate.com/profile/${member.id}
            `.trim();

            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/?text=${encodedMessage}`;

            document.getElementById('share-toast').classList.remove('show');
            window.open(whatsappUrl, '_blank');
            showToast('📤 Opening WhatsApp...', 'success');
        }

        // ============================================================
        // VIEW FUNCTIONS
        // ============================================================
        window.setView = function(view) {
            currentView = view;
            grid.className = 'members-grid' + (view === 'list' ? ' list-view' : '');
            document.getElementById('grid-view').classList.toggle('active', view === 'grid');
            document.getElementById('list-view').classList.toggle('active', view === 'list');
            renderMembers(filteredMembers);
        }

        function updatePagination(total) {
            const pages = Math.ceil(total / perPage);
            if (pages <= 1) {
                paginationContainer.innerHTML = '';
                return;
            }

            let html = `<button onclick="window.goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹ Prev</button>`;
            for (let i = 1; i <= Math.min(pages, 5); i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="window.goToPage(${i})">${i}</button>`;
            }
            if (pages > 5) {
                html += `<span style="color:rgba(26,5,51,0.15);padding:8px;">…</span>`;
                html += `<button onclick="window.goToPage(${pages})">${pages}</button>`;
            }
            html += `<button onclick="window.goToPage(${currentPage + 1})" ${currentPage === pages ? 'disabled' : ''}>Next ›</button>`;

            paginationContainer.innerHTML = html;
        }

        window.goToPage = function(page) {
            const total = filteredMembers.length;
            const pages = Math.ceil(total / perPage);
            if (page < 1 || page > pages) return;
            currentPage = page;
            renderMembers(filteredMembers);
        }

        // ============================================================
        // TOAST
        // ============================================================
        let toastTimeout;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        // INIT
        // ============================================================
        loadMembers();

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.member-card').forEach(card => {
                setupLongPress(card);
            });
        });

        console.log('💎 ClassyDate Members Page - UPDATED!');
        console.log('✅ Modern Purple theme');
        console.log('✅ Love icon at bottom-right of photo');
        console.log('✅ Love icon turns RED when tapped ❤️');
        console.log('✅ Online dot at top-right 🟢');
        console.log('✅ Name: label format');
        console.log('✅ Age: label format');
        console.log('✅ Current Location: label format');
        console.log('✅ Origin Country: label format');
        console.log('✅ Verified badge next to name');
        console.log('✅ View Profile → profile.html');
        console.log('✅ Send Message → chat.html');
    </script>

</body>
</html>
