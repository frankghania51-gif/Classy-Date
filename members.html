<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Members | ClassyDate</title>
    <meta name="description" content="Browse ClassyDate members and find meaningful connections.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #ACC8E5;
            color: #112A46;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; }

        .cb-shell-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(172, 200, 229, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(17, 42, 70, 0.08);
        }

        .cb-shell-header__inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cb-shell-brand {
            display: flex;
            align-items: center;
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 24px;
            font-weight: 700;
            color: #112A46;
        }
        .cb-shell-brand span {
            font-family: "Inter", sans-serif;
            font-weight: 300;
            color: #2E5A88;
        }

        .menu-container {
            position: relative;
            display: inline-block;
        }

        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            font-size: 28px;
            color: #112A46;
            transition: all 0.3s ease;
            border-radius: 8px;
        }

        .menu-btn:hover {
            background: rgba(17, 42, 70, 0.08);
        }

        .menu-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 50px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            min-width: 180px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            z-index: 200;
        }

        .menu-dropdown.show {
            display: block;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-dropdown a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            color: #112A46;
            font-size: 14px;
            font-weight: 500;
            font-family: "Inter", sans-serif;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(17, 42, 70, 0.04);
        }

        .menu-dropdown a:last-child {
            border-bottom: none;
        }

        .menu-dropdown a:hover {
            background: rgba(17, 42, 70, 0.06);
        }

        .menu-dropdown .logout-btn {
            color: #dc3545;
            font-weight: 600;
        }

        .menu-dropdown .logout-btn:hover {
            background: rgba(220, 53, 69, 0.06);
        }

        .members-wrapper {
            flex: 1;
            padding: 100px 0 60px;
            max-width: 100%;
            margin: 0;
            width: 100%;
        }

        .members-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            padding: 0 16px;
        }

        .members-header h1 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 28px;
            color: #112A46;
            font-weight: 700;
        }

        .members-header .member-count {
            color: rgba(17, 42, 70, 0.5);
            font-size: 14px;
            font-family: "Inter", sans-serif;
        }

        .members-header .member-count strong {
            color: #112A46;
            font-weight: 700;
        }

        .view-toggle {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .view-toggle button {
            padding: 6px 14px;
            background: none;
            border: none;
            border-radius: 8px;
            color: rgba(17, 42, 70, 0.4);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
            font-weight: 600;
        }

        .view-toggle button.active {
            background: #112A46;
            color: #fff;
        }
        .view-toggle button:hover:not(.active) {
            color: rgba(17, 42, 70, 0.7);
        }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            padding: 0;
            width: 100%;
        }

        .member-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.4s ease;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            width: 100%;
            border-radius: 0;
        }

        .member-card:hover {
            transform: translateY(-2px);
            border-color: rgba(17, 42, 70, 0.1);
            box-shadow: 0 4px 16px rgba(17, 42, 70, 0.08);
        }

        .member-card.long-press {
            background: rgba(17, 42, 70, 0.05);
            transform: scale(0.98);
        }

        .member-card__image-wrapper {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1/1;
            background: #ACC8E5;
            max-height: 200px;
            width: 100%;
        }

        .member-card__image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .member-card:hover .member-card__image-wrapper img {
            transform: scale(1.03);
        }

        .carousel-slides {
            display: flex;
            transition: transform 0.8s ease;
            height: 100%;
            width: 100%;
        }

        .carousel-slide {
            min-width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
            flex-shrink: 0;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(17, 42, 70, 0.5);
            backdrop-filter: blur(4px);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            cursor: pointer;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .member-card:hover .carousel-btn {
            opacity: 1;
        }

        .carousel-btn:hover {
            background: rgba(17, 42, 70, 0.9);
        }

        .carousel-btn.prev { left: 4px; }
        .carousel-btn.next { right: 4px; }

        .verified-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            background: #1DA1F2;
            border-radius: 50%;
            border: 2px solid #FFFFFF;
            box-shadow: 0 2px 8px rgba(29, 161, 242, 0.5);
            pointer-events: none;
        }

        .verified-badge svg {
            width: 12px;
            height: 12px;
            fill: #FFFFFF;
            display: block;
        }

        .online-dot {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 5;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #28a745;
            border: 2.5px solid #FFFFFF;
            box-shadow: 0 0 12px rgba(40, 167, 69, 0.6);
            animation: pulse-online 1.8s infinite;
            pointer-events: none;
        }

        .online-dot.offline {
            background: #adb5bd;
            animation: none;
            box-shadow: none;
        }

        @keyframes pulse-online {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }

        .member-card__info {
            padding: 8px 10px 10px;
        }

        .member-card__name-row {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .member-card__name-row h3 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 15px;
            font-weight: 700;
            color: #112A46;
        }

        .verified-badge-name {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #1DA1F2;
            color: #fff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 9px;
            font-weight: 700;
            border: 1.5px solid #fff;
            box-shadow: 0 1px 4px rgba(29, 161, 242, 0.3);
            flex-shrink: 0;
        }

        .member-card__location {
            color: rgba(17, 42, 70, 0.4);
            font-size: 11px;
            margin-top: 1px;
            font-family: "Inter", sans-serif;
        }

        .member-card__origin {
            color: rgba(17, 42, 70, 0.4);
            font-size: 11px;
            margin-top: 1px;
            font-family: "Inter", sans-serif;
        }

        .member-card__actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(17, 42, 70, 0.06);
        }

        .member-card__actions button {
            flex: 1;
            padding: 8px 10px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
        }

        .btn-view {
            background: rgba(17, 42, 70, 0.08);
            color: #112A46;
        }
        .btn-view:hover {
            background: rgba(17, 42, 70, 0.18);
            transform: translateY(-2px);
        }

        .btn-message {
            background: linear-gradient(135deg, #112A46, #2E5A88);
            color: #fff;
        }
        .btn-message:hover {
            background: linear-gradient(135deg, #2E5A88, #112A46);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(17, 42, 70, 0.25);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(17, 42, 70, 0.3);
            grid-column: 1 / -1;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-state h3 {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 22px;
            color: #112A46;
            margin-bottom: 6px;
        }

        .empty-state p {
            font-family: "Inter", sans-serif;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            padding: 0 16px;
        }

        .pagination button {
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: rgba(17, 42, 70, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            font-size: 12px;
        }

        .pagination button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .pagination button.active {
            background: #112A46;
            color: #fff;
            border-color: #112A46;
        }
        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 20px;
            background: #112A46;
            color: #fff;
            border-radius: 10px;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            font-size: 13px;
            z-index: 999;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 360px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success {
            background: #28a745;
        }
        .toast.error {
            background: #dc3545;
        }

        @media (max-width: 768px) {
            .members-wrapper {
                padding: 90px 0 40px;
            }

            .members-header {
                padding: 0 10px;
                margin-bottom: 12px;
            }

            .members-header h1 {
                font-size: 22px;
            }

            .members-grid {
                gap: 3px;
            }

            .member-card__image-wrapper {
                max-height: 170px;
            }

            .member-card__info {
                padding: 6px 8px 8px;
            }

            .member-card__name-row h3 {
                font-size: 13px;
            }

            .verified-badge-name {
                width: 14px;
                height: 14px;
                font-size: 8px;
            }

            .member-card__location {
                font-size: 10px;
            }

            .member-card__origin {
                font-size: 10px;
            }

            .member-card__actions {
                gap: 4px;
                margin-top: 6px;
                padding-top: 6px;
            }

            .member-card__actions button {
                font-size: 10px;
                padding: 6px 8px;
                border-radius: 6px;
            }

            .verified-badge {
                width: 18px;
                height: 18px;
                top: 6px;
                right: 6px;
            }

            .verified-badge svg {
                width: 10px;
                height: 10px;
            }

            .online-dot {
                width: 12px;
                height: 12px;
                top: 6px;
                left: 6px;
            }

            .carousel-btn {
                width: 20px;
                height: 20px;
                font-size: 10px;
            }

            .toast {
                bottom: 20px;
                right: 20px;
                left: 20px;
                text-align: center;
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .members-wrapper {
                padding: 80px 0 30px;
            }

            .members-header h1 {
                font-size: 18px;
            }

            .members-header .member-count {
                font-size: 12px;
            }

            .view-toggle button {
                font-size: 11px;
                padding: 4px 10px;
            }

            .members-grid {
                gap: 2px;
            }

            .member-card__image-wrapper {
                max-height: 140px;
            }

            .member-card__info {
                padding: 4px 6px 6px;
            }

            .member-card__name-row h3 {
                font-size: 11px;
            }

            .verified-badge-name {
                width: 12px;
                height: 12px;
                font-size: 7px;
            }

            .member-card__location {
                font-size: 9px;
            }

            .member-card__origin {
                font-size: 9px;
            }

            .member-card__actions button {
                font-size: 9px;
                padding: 4px 6px;
                border-radius: 4px;
            }

            .verified-badge {
                width: 16px;
                height: 16px;
                top: 4px;
                right: 4px;
            }

            .verified-badge svg {
                width: 9px;
                height: 9px;
            }

            .online-dot {
                width: 10px;
                height: 10px;
                top: 4px;
                left: 4px;
                border-width: 2px;
            }

            .carousel-btn {
                width: 18px;
                height: 18px;
                font-size: 9px;
            }

            .pagination button {
                font-size: 11px;
                padding: 3px 10px;
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header class="cb-shell-header" role="banner">
        <div class="cb-shell-header__inner">
            <a class="cb-shell-brand" href="/">Classy<span>Date</span></a>
            <div class="menu-container">
                <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">☰</button>
                <div class="menu-dropdown" id="menuDropdown">
                    <a href="#" onclick="logoutUser()" class="logout-btn">🚪 Log out</a>
                </div>
            </div>
        </div>
    </header>

    <main class="members-wrapper">
        <div class="members-header">
            <div>
                <h1>Browse <span>Members</span></h1>
                <span class="member-count">Showing <strong id="total-count">0</strong> members</span>
            </div>
            <div class="view-toggle">
                <button class="active" onclick="setView('grid')" id="grid-view">▦ Grid</button>
                <button onclick="setView('list')" id="list-view">☰ List</button>
            </div>
        </div>

        <div class="members-grid" id="members-grid"></div>
        <div class="pagination" id="pagination"></div>
    </main>

    <div class="toast" id="toast"></div>

    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
            }
        }
    </script>

    <script type="module">
        import { createClient } from "@supabase/supabase-js";

        const SUPABASE_URL = 'https://ehfnzsfnsoiyiwpxqmli.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ybgZxnGuU_Gt35rfqkEdBw_YkEdD8vl';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        console.log('🔥 Supabase connected!');

        let allMembers = [];
        let filteredMembers = [];
        let currentPage = 1;
        const perPage = 6;
        let currentView = 'grid';
        let isLoading = true;
        let selectedMemberId = null;

        const photoIndexMap = {};
        const carouselIntervals = {};

        const grid = document.getElementById('members-grid');
        const paginationContainer = document.getElementById('pagination');
        const totalCount = document.getElementById('total-count');

        function getPhotoUrl(fileId) {
            if (!fileId) return null;
            try {
                const { data } = supabase.storage.from('member_photos').getPublicUrl(fileId);
                return data?.publicUrl || null;
            } catch (error) {
                console.warn('Error getting photo URL for:', fileId, error);
                return null;
            }
        }

        window.toggleMenu = function() {
            const dropdown = document.getElementById('menuDropdown');
            dropdown.classList.toggle('show');
        }

        document.addEventListener('click', function(e) {
            const container = document.querySelector('.menu-container');
            if (container && !container.contains(e.target)) {
                document.getElementById('menuDropdown').classList.remove('show');
            }
        });

        window.logoutUser = function() {
            localStorage.removeItem('classy_user');
            localStorage.removeItem('classydate_user');
            localStorage.removeItem('classy_user_email');
            localStorage.removeItem('classy_user_name');
            localStorage.removeItem('classy_user_id');
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'login.html';
        }

        // ============================================================
        // LOAD MEMBERS - ONLY VERIFIED (ADMIN-CREATED)
        // ============================================================
        async function loadMembers() {
            try {
                const { data, error } = await supabase
                    .from('members')
                    .select('*')
                    .eq('verified', true)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allMembers = data || [];
                isLoading = false;
                console.log('📊 Admin members loaded:', allMembers.length);
                
                totalCount.textContent = allMembers.length;
                filteredMembers = [...allMembers];
                renderMembers(filteredMembers);
                updatePagination(filteredMembers.length);
                
            } catch (error) {
                console.error('Error loading members:', error);
                showToast('Error loading members: ' + error.message, 'error');
                isLoading = false;
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">⚠️</div>
                        <h3>Could not load members</h3>
                        <p>Please check your connection.</p>
                    </div>
                `;
            }
        }

        // ============================================================
        // CHANGE PHOTO
        // ============================================================
        window.changePhoto = function(memberId, direction) {
            const wrapper = document.querySelector(`.member-card__image-wrapper[data-member="${memberId}"]`);
            if (!wrapper) return;

            const slides = wrapper.querySelector('.carousel-slides');
            if (!slides) return;
            const totalSlides = slides.children.length;
            if (totalSlides <= 1) return;

            if (!photoIndexMap[memberId]) photoIndexMap[memberId] = 0;
            let current = photoIndexMap[memberId];

            let newIndex = current + direction;
            if (newIndex < 0) newIndex = totalSlides - 1;
            if (newIndex >= totalSlides) newIndex = 0;

            slides.style.transform = `translateX(-${newIndex * 100}%)`;
            photoIndexMap[memberId] = newIndex;
        }

        // ============================================================
        // START CAROUSEL - EACH CARD DIFFERENT TIMING
        // ============================================================
        function startCarousel(memberId) {
            if (carouselIntervals[memberId]) clearInterval(carouselIntervals[memberId]);
            
            const wrapper = document.querySelector(`.member-card__image-wrapper[data-member="${memberId}"]`);
            if (!wrapper) return;
            
            const slides = wrapper.querySelector('.carousel-slides');
            if (!slides || slides.children.length <= 1) return;

            const randomDelay = 3500 + Math.random() * 2000;
            
            carouselIntervals[memberId] = setInterval(() => {
                window.changePhoto(memberId, 1);
            }, randomDelay);
        }

        function stopCarousel(memberId) {
            if (carouselIntervals[memberId]) {
                clearInterval(carouselIntervals[memberId]);
                delete carouselIntervals[memberId];
            }
        }

        // ============================================================
        // RENDER MEMBERS
        // ============================================================
        function renderMembers(members) {
            console.log('🎨 Rendering members:', members.length);
            
            if (isLoading) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:rgba(17,42,70,0.3);">
                        <span style="display:inline-block;width:30px;height:30px;border:3px solid rgba(17,42,70,0.1);border-top-color:#112A46;border-radius:50%;animation:spin 0.8s linear infinite;"></span>
                        <br><br>Loading members...
                    </div>
                `;
                return;
            }

            if (members.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">💎</div>
                        <h3>No members yet</h3>
                        <p>Check back soon for amazing people!</p>
                    </div>
                `;
                return;
            }

            totalCount.textContent = members.length;

            grid.innerHTML = members.map(member => {
                let photos = [];
                if (member.photo_file_ids && member.photo_file_ids.length > 0) {
                    photos = member.photo_file_ids
                        .map(id => getPhotoUrl(id))
                        .filter(url => url !== null && url !== '');
                }

                const memberName = member.name || 'User';
                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=112A46&color=fff&size=400`;
                
                if (photos.length === 0) {
                    photos = [avatarUrl];
                }

                let slidesHTML = '';
                photos.forEach((photo, index) => {
                    slidesHTML += `
                        <div class="carousel-slide">
                            <img src="${photo}" alt="${memberName}" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=112A46&color=fff&size=400'">
                        </div>
                    `;
                });

                const verifiedBadge = member.verified ? `
                    <div class="verified-badge">
                        <svg viewBox="0 0 24 24" fill="white">
                            <path d="M12 1L9.5 5L5 6L7 10L5 14L9.5 15L12 19L14.5 15L19 14L17 10L19 6L14.5 5L12 1Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
                            <path d="M9 12L11 14L15 10" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                ` : '';

                const isOnline = Math.random() > 0.5;
                const onlineDot = isOnline ? 
                    `<span class="online-dot"></span>` : 
                    `<span class="online-dot offline"></span>`;

                const verifiedBadgeName = member.verified ? 
                    `<span class="verified-badge-name">✓</span>` : '';

                return `
                    <div class="member-card" data-id="${member.id}" data-name="${memberName}" data-location="${member.location || ''}" data-origin="${member.origin || ''}" data-age="${member.age || ''}" data-verified="${member.verified}">
                        <div class="member-card__image-wrapper" data-member="${member.id}">
                            <div class="carousel-slides" style="display:flex;transition:transform 0.8s ease;">
                                ${slidesHTML}
                            </div>
                            ${verifiedBadge}
                            ${onlineDot}
                            ${photos.length > 1 ? `
                                <button class="carousel-btn prev" onclick="event.stopPropagation(); window.changePhoto('${member.id}', -1)">‹</button>
                                <button class="carousel-btn next" onclick="event.stopPropagation(); window.changePhoto('${member.id}', 1)">›</button>
                            ` : ''}
                        </div>
                        <div class="member-card__info">
                            <div class="member-card__name-row">
                                <h3>${memberName}</h3>
                                ${verifiedBadgeName}
                            </div>
                            <div class="member-card__location">📍 ${member.location || 'Location Unknown'}</div>
                            <div class="member-card__origin">🌍 Origin: ${member.origin || 'Not specified'}</div>
                            <div class="member-card__actions">
                                <button class="btn-view" onclick="event.stopPropagation(); window.viewProfile('${member.id}')">👤 View</button>
                                <button class="btn-message" onclick="event.stopPropagation(); window.sendMessage('${member.id}')">💬 Message</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            members.forEach(member => {
                startCarousel(member.id);
            });

            document.querySelectorAll('.member-card').forEach(card => {
                card.removeEventListener('click', handleCardClick);
                card.addEventListener('click', handleCardClick);
            });

            updatePagination(members.length);
        }

        // ============================================================
        // HANDLE CARD CLICK - Opens Profile Page
        // ============================================================
        function handleCardClick(e) {
            if (e.target.closest('.btn-view') || e.target.closest('.btn-message') || e.target.closest('.carousel-btn')) {
                return;
            }
            const card = e.currentTarget;
            const id = card.dataset.id;
            if (id) {
                window.viewProfile(id);
            }
        }

        // ============================================================
        // ✅ VIEW PROFILE - Navigate to profile.html
        // ============================================================
        window.viewProfile = function(id) {
            const member = allMembers.find(m => m.id === id);
            if (!member) {
                showToast('❌ Member not found', 'error');
                return;
            }
            // Save member data for the profile page
            localStorage.setItem('classydate_selected_member', JSON.stringify(member));
            window.location.href = `profile.html?id=${id}`;
        }

        // ============================================================
        // ✅ SEND MESSAGE - Navigate to chat.html
        // ============================================================
        window.sendMessage = function(id) {
            const member = allMembers.find(m => m.id === id);
            if (!member) {
                showToast('❌ Member not found', 'error');
                return;
            }

            const user = localStorage.getItem('classy_user');
            if (!user) {
                showToast('🔒 Please log in to send messages', 'error');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                return;
            }

            // Save member data for the chat page
            localStorage.setItem('classydate_selected_member', JSON.stringify(member));
            
            // Redirect to chat with member details
            window.location.href = `chat.html?user=${id}&name=${encodeURIComponent(member.name)}&location=${encodeURIComponent(member.location || '')}&origin=${encodeURIComponent(member.origin || '')}`;
        }

        // ============================================================
        // VIEW FUNCTIONS
        // ============================================================
        window.setView = function(view) {
            currentView = view;
            grid.className = 'members-grid' + (view === 'list' ? ' list-view' : '');
            document.getElementById('grid-view').classList.toggle('active', view === 'grid');
            document.getElementById('list-view').classList.toggle('active', view === 'list');
            renderMembers(filteredMembers);
        }

        function updatePagination(total) {
            const pages = Math.ceil(total / perPage);
            if (pages <= 1) {
                paginationContainer.innerHTML = '';
                return;
            }

            let html = `<button onclick="window.goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹ Prev</button>`;
            for (let i = 1; i <= Math.min(pages, 5); i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="window.goToPage(${i})">${i}</button>`;
            }
            if (pages > 5) {
                html += `<span style="color:rgba(17,42,70,0.15);padding:8px;">…</span>`;
                html += `<button onclick="window.goToPage(${pages})">${pages}</button>`;
            }
            html += `<button onclick="window.goToPage(${currentPage + 1})" ${currentPage === pages ? 'disabled' : ''}>Next ›</button>`;

            paginationContainer.innerHTML = html;
        }

        window.goToPage = function(page) {
            const total = filteredMembers.length;
            const pages = Math.ceil(total / perPage);
            if (page < 1 || page > pages) return;
            currentPage = page;
            renderMembers(filteredMembers);
        }

        // ============================================================
        // TOAST
        // ============================================================
        let toastTimeout;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        // INIT
        // ============================================================
        loadMembers();

        console.log('💎 ClassyDate Members Page - FULLY WORKING!');
        console.log('✅ View Profile → profile.html');
        console.log('✅ Send Message → chat.html with member details');
        console.log('✅ Tap anywhere on card opens profile');
        console.log('✅ Cards touch left and right edges');
    </script>

</body>
</html>
