<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Profile | ClassyDate</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #ACC8E5;
            color: #112A46;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; }

        /* ============================================================ */
        /* HEADER                                                       */
        /* ============================================================ */
        .profile-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(172, 200, 229, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(17, 42, 70, 0.08);
            padding: 0 16px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .profile-header .brand {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 20px;
            font-weight: 700;
            color: #112A46;
        }

        .profile-header .brand span {
            font-family: "Inter", sans-serif;
            font-weight: 300;
            color: #2E5A88;
        }

        .profile-header .back-btn {
            padding: 6px 14px;
            border-radius: 50px;
            background: rgba(17, 42, 70, 0.08);
            color: #112A46;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            font-family: "Inter", sans-serif;
            transition: all 0.3s ease;
        }

        .profile-header .back-btn:hover {
            background: rgba(17, 42, 70, 0.15);
        }

        /* ============================================================ */
        /* PROFILE WRAPPER                                             */
        /* ============================================================ */
        .profile-wrapper {
            flex: 1;
            padding: 72px 0 0;
            max-width: 100%;
            margin: 0;
            width: 100%;
            background: #ACC8E5;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            overflow: hidden;
            border: none;
            width: 100%;
            margin: 0;
            border-radius: 0;
        }

        /* ============================================================ */
        /* TOP SECTION - AVATAR + INFO                                 */
        /* ============================================================ */
        .profile-top {
            text-align: center;
            padding: 20px 16px 14px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #FFFFFF;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin: 0 auto 12px;
            display: block;
        }

        .profile-name {
            font-family: "Playfair Display", Georgia, 'Times New Roman', serif;
            font-size: 22px;
            font-weight: 700;
            color: #112A46;
        }

        .profile-name .verified-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #1DA1F2;
            color: #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            font-weight: 700;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(29, 161, 242, 0.4);
            margin-left: 4px;
        }

        .profile-location {
            font-size: 14px;
            color: rgba(17, 42, 70, 0.5);
            margin-top: 2px;
            font-family: "Inter", sans-serif;
        }

        .profile-origin {
            font-size: 14px;
            color: rgba(17, 42, 70, 0.5);
            margin-top: 1px;
            font-family: "Inter", sans-serif;
        }

        .profile-status-row {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 8px;
        }

        .profile-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            font-family: "Inter", sans-serif;
        }

        .profile-status .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .profile-status .dot.online {
            background: #28a745;
            animation: pulse-online 1.8s infinite;
        }

        .profile-status .dot.offline {
            background: #adb5bd;
        }

        .profile-status .online-text {
            color: #28a745;
        }

        .profile-status .offline-text {
            color: rgba(17, 42, 70, 0.3);
        }

        @keyframes pulse-online {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }

        /* ============================================================ */
        /* DETAILS SECTION                                             */
        /* ============================================================ */
        .profile-details {
            padding: 0 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .detail-box {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .detail-box .label {
            font-size: 10px;
            color: rgba(17, 42, 70, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            font-family: "Inter", sans-serif;
        }

        .detail-box .value {
            font-size: 14px;
            font-weight: 700;
            color: #112A46;
            margin-top: 2px;
            font-family: "Inter", sans-serif;
        }

        /* ============================================================ */
        /* ABOUT ME                                                    */
        /* ============================================================ */
        .profile-about {
            padding: 0 16px;
            margin-bottom: 12px;
        }

        .profile-about .about-box {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .profile-about .about-box .about-label {
            font-size: 10px;
            color: rgba(17, 42, 70, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
            font-family: "Inter", sans-serif;
        }

        .profile-about .about-box .about-text {
            font-size: 14px;
            color: rgba(17, 42, 70, 0.7);
            line-height: 1.5;
            font-family: "Inter", sans-serif;
        }

        /* ============================================================ */
        /* LOOKING FOR                                                 */
        /* ============================================================ */
        .profile-looking {
            padding: 0 16px;
            margin-bottom: 12px;
        }

        .profile-looking .looking-box {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .profile-looking .looking-box .looking-label {
            font-size: 10px;
            color: rgba(17, 42, 70, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
            font-family: "Inter", sans-serif;
        }

        .profile-looking .looking-box .looking-text {
            font-size: 14px;
            color: rgba(17, 42, 70, 0.7);
            line-height: 1.5;
            font-family: "Inter", sans-serif;
        }

        /* ============================================================ */
        /* INTERESTS                                                   */
        /* ============================================================ */
        .profile-interests {
            padding: 0 16px;
            margin-bottom: 16px;
        }

        .profile-interests .interests-box {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .profile-interests .interests-box .interests-label {
            font-size: 10px;
            color: rgba(17, 42, 70, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            font-family: "Inter", sans-serif;
        }

        .profile-interests .tag {
            display: inline-block;
            padding: 3px 12px;
            background: rgba(17, 42, 70, 0.06);
            border-radius: 50px;
            font-size: 12px;
            color: #112A46;
            font-family: "Inter", sans-serif;
            font-weight: 500;
            margin: 2px 4px 2px 0;
        }

        /* ============================================================ */
        /* PHOTOS CAROUSEL                                             */
        /* ============================================================ */
        .profile-photos {
            padding: 0 0 16px;
            margin: 0;
            width: 100%;
        }

        .profile-photos .photos-wrapper {
            position: relative;
            overflow: hidden;
            width: 100%;
            background: rgba(0, 0, 0, 0.05);
            aspect-ratio: 16/10;
            max-height: 300px;
        }

        .profile-photos .photos-slides {
            display: flex;
            transition: transform 0.5s ease;
            touch-action: pan-y;
            width: 100%;
            height: 100%;
        }

        .profile-photos .photo-slide {
            min-width: 100%;
            height: 100%;
            overflow: hidden;
            flex-shrink: 0;
            background: #d0d5da;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-photos .photo-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #e8ecf0;
        }

        .photo-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(17, 42, 70, 0.4);
            backdrop-filter: blur(4px);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 16px;
            cursor: pointer;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .photo-nav-btn:hover {
            background: rgba(17, 42, 70, 0.7);
        }

        .photo-nav-btn.prev { left: 8px; }
        .photo-nav-btn.next { right: 8px; }

        /* ============================================================ */
        /* ACTION BUTTONS                                              */
        /* ============================================================ */
        .profile-actions {
            padding: 0 16px 20px;
            display: flex;
            gap: 10px;
        }

        .profile-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Inter", sans-serif;
        }

        .btn-message-profile {
            background: linear-gradient(135deg, #112A46, #2E5A88);
            color: #fff;
        }

        .btn-message-profile:hover {
            background: linear-gradient(135deg, #2E5A88, #112A46);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(17, 42, 70, 0.25);
        }

        .btn-share {
            background: rgba(17, 42, 70, 0.08);
            color: #112A46;
            flex: 0.5;
        }

        .btn-share:hover {
            background: rgba(17, 42, 70, 0.18);
            transform: translateY(-2px);
        }

        /* ============================================================ */
        /* TOAST                                                       */
        /* ============================================================ */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 20px;
            background: #112A46;
            color: #fff;
            border-radius: 10px;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            font-size: 13px;
            z-index: 999;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 360px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success {
            background: #28a745;
        }
        .toast.error {
            background: #dc3545;
        }

        /* ============================================================ */
        /* RESPONSIVE                                                   */
        /* ============================================================ */
        @media (max-width: 768px) {
            .profile-wrapper {
                padding: 68px 0 0;
            }

            .profile-top {
                padding: 16px 14px 12px;
            }

            .profile-avatar {
                width: 85px;
                height: 85px;
            }

            .profile-name {
                font-size: 20px;
            }

            .profile-location,
            .profile-origin {
                font-size: 13px;
            }

            .profile-status {
                font-size: 12px;
            }

            .profile-details {
                padding: 0 14px;
                gap: 8px;
            }

            .detail-box {
                padding: 8px 10px;
            }

            .detail-box .value {
                font-size: 13px;
            }

            .profile-about,
            .profile-looking {
                padding: 0 14px;
                margin-bottom: 10px;
            }

            .profile-about .about-box,
            .profile-looking .looking-box {
                padding: 10px 12px;
            }

            .profile-about .about-box .about-text,
            .profile-looking .looking-box .looking-text {
                font-size: 13px;
            }

            .profile-interests {
                padding: 0 14px;
                margin-bottom: 14px;
            }

            .profile-interests .interests-box {
                padding: 10px 12px;
            }

            .profile-interests .tag {
                font-size: 11px;
            }

            .profile-photos .photos-wrapper {
                aspect-ratio: 16/10;
                max-height: 260px;
            }

            .profile-actions {
                padding: 0 14px 16px;
                gap: 8px;
            }

            .profile-actions button {
                font-size: 13px;
                padding: 10px;
            }

            .photo-nav-btn {
                width: 26px;
                height: 26px;
                font-size: 14px;
            }

            .profile-header {
                height: 56px;
                padding: 0 14px;
            }

            .profile-header .brand {
                font-size: 18px;
            }

            .profile-header .back-btn {
                font-size: 12px;
                padding: 5px 12px;
            }
        }

        @media (max-width: 480px) {
            .profile-wrapper {
                padding: 62px 0 0;
            }

            .profile-top {
                padding: 14px 12px 10px;
            }

            .profile-avatar {
                width: 75px;
                height: 75px;
                border-width: 2px;
            }

            .profile-name {
                font-size: 18px;
            }

            .profile-location,
            .profile-origin {
                font-size: 12px;
            }

            .profile-status {
                font-size: 12px;
            }

            .profile-status .dot {
                width: 8px;
                height: 8px;
            }

            .profile-details {
                padding: 0 12px;
                gap: 6px;
            }

            .detail-box {
                padding: 6px 8px;
                border-radius: 8px;
            }

            .detail-box .label {
                font-size: 9px;
            }

            .detail-box .value {
                font-size: 12px;
            }

            .profile-about,
            .profile-looking {
                padding: 0 12px;
                margin-bottom: 8px;
            }

            .profile-about .about-box,
            .profile-looking .looking-box {
                padding: 8px 10px;
            }

            .profile-about .about-box .about-label,
            .profile-looking .looking-box .looking-label {
                font-size: 9px;
            }

            .profile-about .about-box .about-text,
            .profile-looking .looking-box .looking-text {
                font-size: 12px;
            }

            .profile-interests {
                padding: 0 12px;
                margin-bottom: 12px;
            }

            .profile-interests .interests-box {
                padding: 8px 10px;
            }

            .profile-interests .interests-label {
                font-size: 9px;
            }

            .profile-interests .tag {
                font-size: 10px;
                padding: 2px 10px;
            }

            .profile-photos .photos-wrapper {
                aspect-ratio: 16/10;
                max-height: 200px;
            }

            .profile-actions {
                padding: 0 12px 14px;
                gap: 6px;
            }

            .profile-actions button {
                font-size: 12px;
                padding: 8px;
                border-radius: 8px;
            }

            .photo-nav-btn {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }

            .profile-header {
                height: 50px;
                padding: 0 10px;
            }

            .profile-header .brand {
                font-size: 16px;
            }

            .profile-header .back-btn {
                font-size: 11px;
                padding: 4px 10px;
            }

            .toast {
                bottom: 16px;
                right: 16px;
                left: 16px;
                text-align: center;
                max-width: 100%;
                font-size: 12px;
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- HEADER                                                        -->
    <!-- ============================================================ -->
    <header class="profile-header">
        <button class="back-btn" onclick="goBack()">← Back</button>
        <a class="brand" href="/">Classy<span>Date</span></a>
        <div style="width:50px;"></div>
    </header>

    <!-- ============================================================ -->
    <!-- PROFILE CONTENT                                              -->
    <!-- ============================================================ -->
    <main class="profile-wrapper">
        <div class="profile-card">

            <!-- TOP SECTION - AVATAR + INFO -->
            <div class="profile-top">
                <img class="profile-avatar" id="profile-avatar" src="" alt="Profile">
                <h1 class="profile-name" id="profile-name">
                    Loading...
                    <span class="verified-badge">✓</span>
                </h1>
                <div class="profile-location" id="profile-location">📍 Loading...</div>
                <div class="profile-origin" id="profile-origin">🌍 Origin: Loading...</div>

                <div class="profile-status-row">
                    <span class="profile-status">
                        <span class="dot online" id="status-dot"></span>
                        <span class="online-text" id="status-text">Online</span>
                    </span>
                </div>
            </div>

            <!-- DETAILS -->
            <div class="profile-details">
                <div class="detail-box">
                    <div class="label">Age</div>
                    <div class="value" id="profile-age">—</div>
                </div>
                <div class="detail-box">
                    <div class="label">Gender</div>
                    <div class="value" id="profile-gender">—</div>
                </div>
            </div>

            <!-- ABOUT ME -->
            <div class="profile-about">
                <div class="about-box">
                    <span class="about-label">📝 About Me</span>
                    <span class="about-text" id="profile-bio">No bio available.</span>
                </div>
            </div>

            <!-- LOOKING FOR -->
            <div class="profile-looking">
                <div class="looking-box">
                    <span class="looking-label">🔍 Looking For</span>
                    <span class="looking-text" id="profile-looking">Not specified</span>
                </div>
            </div>

            <!-- INTERESTS -->
            <div class="profile-interests">
                <div class="interests-box">
                    <span class="interests-label">🏷️ Interests</span>
                    <div id="profile-interests">
                        <span style="color:rgba(17,42,70,0.3);font-size:13px;">No interests listed</span>
                    </div>
                </div>
            </div>

            <!-- PHOTOS CAROUSEL -->
            <div class="profile-photos">
                <div class="photos-wrapper" id="photos-wrapper">
                    <div class="photos-slides" id="photos-slides"></div>
                    <button class="photo-nav-btn prev" onclick="changeProfilePhoto(-1)">‹</button>
                    <button class="photo-nav-btn next" onclick="changeProfilePhoto(1)">›</button>
                </div>
            </div>

            <!-- ACTIONS -->
            <div class="profile-actions">
                <button class="btn-message-profile" id="message-btn" onclick="sendMessage()">💬 Send Message</button>
                <button class="btn-share" onclick="shareProfile()">↗ Share</button>
            </div>

        </div>
    </main>

    <!-- ============================================================ -->
    <!-- TOAST                                                       -->
    <!-- ============================================================ -->
    <div class="toast" id="toast"></div>

    <!-- ============================================================ -->
    <!-- SCRIPTS                                                      -->
    <!-- ============================================================ -->
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
            }
        }
    </script>

    <script type="module">
        import { createClient } from "@supabase/supabase-js";

        const SUPABASE_URL = 'https://ehfnzsfnsoiyiwpxqmli.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ybgZxnGuU_Gt35rfqkEdBw_YkEdD8vl';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        console.log('🔥 Supabase connected!');

        let memberData = null;
        let profilePhotos = [];
        let currentPhotoIndex = 0;

        function getMemberIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        function getPhotoUrl(fileId) {
            if (!fileId) return null;
            try {
                const { data } = supabase.storage.from('member_photos').getPublicUrl(fileId);
                return data?.publicUrl || null;
            } catch (error) {
                console.warn('Error getting photo URL for:', fileId, error);
                return null;
            }
        }

        async function loadProfile() {
            const memberId = getMemberIdFromURL();
            if (!memberId) {
                showToast('❌ No member specified', 'error');
                setTimeout(() => {
                    window.location.href = 'members.html';
                }, 1500);
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('members')
                    .select('*')
                    .eq('id', memberId)
                    .maybeSingle();

                if (error) throw error;

                if (!data) {
                    showToast('❌ Member not found', 'error');
                    setTimeout(() => {
                        window.location.href = 'members.html';
                    }, 1500);
                    return;
                }

                memberData = data;
                console.log('📊 Member loaded:', memberData);
                renderProfile(memberData);

            } catch (error) {
                console.error('Error loading profile:', error);
                showToast('Error loading profile: ' + error.message, 'error');
            }
        }

        function renderProfile(member) {
            const memberName = member.name || 'User';

            let photos = [];
            if (member.photo_file_ids && member.photo_file_ids.length > 0) {
                photos = member.photo_file_ids
                    .map(id => getPhotoUrl(id))
                    .filter(url => url !== null && url !== '');
            }

            const avatarUrl = photos.length > 0 ? photos[0] : 
                `https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=112A46&color=fff&size=200`;

            document.getElementById('profile-avatar').src = avatarUrl;
            document.getElementById('profile-avatar').onerror = function() {
                this.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=112A46&color=fff&size=200`;
            };

            let nameHTML = memberName;
            if (member.verified) {
                nameHTML += ' <span class="verified-badge">✓</span>';
            }
            document.getElementById('profile-name').innerHTML = nameHTML;

            document.getElementById('profile-location').textContent = `📍 ${member.location || 'Location Unknown'}`;
            document.getElementById('profile-origin').textContent = `🌍 Origin: ${member.origin || 'Not specified'}`;

            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            if (member.online) {
                statusDot.className = 'dot online';
                statusText.textContent = 'Online';
                statusText.style.color = '#28a745';
            } else {
                statusDot.className = 'dot offline';
                statusText.textContent = 'Offline';
                statusText.style.color = 'rgba(17,42,70,0.3)';
            }

            document.getElementById('profile-age').textContent = member.age || '—';
            document.getElementById('profile-gender').textContent = member.gender || '—';
            document.getElementById('profile-bio').textContent = member.about_me || member.bio || 'No bio available.';
            document.getElementById('profile-looking').textContent = member.looking_for || 'Not specified';

            const interestsContainer = document.getElementById('profile-interests');
            if (member.interests && member.interests.length > 0) {
                interestsContainer.innerHTML = member.interests.map(i => `<span class="tag">#${i}</span>`).join('');
            } else {
                interestsContainer.innerHTML = '<span style="color:rgba(17,42,70,0.3);font-size:13px;">No interests listed</span>';
            }

            profilePhotos = photos.length > 0 ? photos : [
                `https://ui-avatars.com/api/?name=${encodeURIComponent(memberName)}&background=112A46&color=fff&size=400`
            ];
            renderPhotos();

            document.getElementById('message-btn').onclick = function() {
                sendMessage(member);
            };
        }

        function renderPhotos() {
            const slidesContainer = document.getElementById('photos-slides');
            
            if (profilePhotos.length === 0) {
                slidesContainer.innerHTML = `
                    <div class="photo-slide" style="display:flex;align-items:center;justify-content:center;background:#d0d5da;color:rgba(17,42,70,0.3);font-family:'Inter',sans-serif;font-size:14px;">
                        No photos available
                    </div>
                `;
                return;
            }

            slidesContainer.innerHTML = profilePhotos.map((photo, index) => `
                <div class="photo-slide">
                    <img src="${photo}" alt="Photo ${index + 1}" loading="lazy" onerror="this.style.display='none'">
                </div>
            `).join('');

            currentPhotoIndex = 0;
            slidesContainer.style.transform = 'translateX(0%)';

            const prevBtn = document.querySelector('.photo-nav-btn.prev');
            const nextBtn = document.querySelector('.photo-nav-btn.next');
            if (profilePhotos.length <= 1) {
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'none';
            } else {
                prevBtn.style.display = 'flex';
                nextBtn.style.display = 'flex';
            }
        }

        window.changeProfilePhoto = function(direction) {
            const slides = document.getElementById('photos-slides');
            if (!slides) return;
            
            const totalSlides = slides.children.length;
            if (totalSlides <= 1) return;
            
            let newIndex = currentPhotoIndex + direction;
            if (newIndex < 0) newIndex = totalSlides - 1;
            if (newIndex >= totalSlides) newIndex = 0;
            
            slides.style.transform = `translateX(-${newIndex * 100}%)`;
            currentPhotoIndex = newIndex;
        }

        window.sendMessage = function(member) {
            const targetMember = member || memberData;
            if (!targetMember) {
                showToast('❌ Member not found', 'error');
                return;
            }

            const user = localStorage.getItem('classy_user');
            if (!user) {
                showToast('🔒 Please log in to send messages', 'error');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                return;
            }

            localStorage.setItem('classydate_selected_member', JSON.stringify(targetMember));
            window.location.href = `chat.html?user=${targetMember.id}&name=${encodeURIComponent(targetMember.name)}&location=${encodeURIComponent(targetMember.location || '')}&origin=${encodeURIComponent(targetMember.origin || '')}`;
        }

        window.shareProfile = function() {
            if (!memberData) return;

            const name = memberData.name || 'Member';
            const location = memberData.location || 'Unknown';
            const origin = memberData.origin || 'Not specified';
            const age = memberData.age || '?';
            const verified = memberData.verified ? '✅ Verified Member' : '';

            const message = `
👤 *${name}* ${verified ? '✔️' : ''}
📍 Location: ${location}
🌍 Origin: ${origin}
🎂 Age: ${age}
💎 ClassyDate Member

---
Check out this profile on ClassyDate!
${window.location.href}
            `.trim();

            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/?text=${encodedMessage}`;
            window.open(whatsappUrl, '_blank');
            showToast('📤 Opening WhatsApp...', 'success');
        }

        window.goBack = function() {
            window.location.href = 'members.html';
        }

        let toastTimeout;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        let touchStartX = 0;

        document.addEventListener('DOMContentLoaded', function() {
            const wrapper = document.getElementById('photos-wrapper');
            
            if (wrapper) {
                wrapper.addEventListener('touchstart', function(e) {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });

                wrapper.addEventListener('touchend', function(e) {
                    const touchEndX = e.changedTouches[0].screenX;
                    const diff = touchStartX - touchEndX;
                    
                    if (Math.abs(diff) > 40) {
                        if (diff > 0) {
                            window.changeProfilePhoto(1);
                        } else {
                            window.changeProfilePhoto(-1);
                        }
                    }
                }, { passive: true });
            }
        });

        loadProfile();

        console.log('💎 Profile View Page - CLEAN & COMPRESSED!');
        console.log('✅ Consistent font sizes');
        console.log('✅ No oversized fonts');
        console.log('✅ Clean layout');
        console.log('✅ Images NOT cut');
        console.log('✅ Online/Offline dot restored');
    </script>

</body>
</html>
